// Polyfill roundRect for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath()}}

const AudioCtx=window.AudioContext||window.webkitAudioContext
let audioCtx=null,soundOn=true,ambientNode=null
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx}
function playAmbient(){if(!soundOn)return;ensureAudio();if(ambientNode)return;const g=(audioCtx.createGain());g.gain.value=0.01;g.connect(audioCtx.destination);ambientNode={_ns:[],stop(){g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);setTimeout(()=>{ambientNode._ns.forEach(n=>{try{n.stop()}catch{}});ambientNode=null},600)}};const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=55;const gg=audioCtx.createGain();gg.gain.value=0.05;o.connect(gg);gg.connect(g);o.start();ambientNode._ns.push(o)}
function sfx(t){if(!soundOn)return;ensureAudio();const g=audioCtx.createGain();g.connect(audioCtx.destination);const now=audioCtx.currentTime;if(t==='footstep'){g.gain.setValueAtTime(0.015,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.05);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(80+Math.random()*40,now);o.connect(g);o.start(now);o.stop(now+0.05)}else if(t==='notification'){g.gain.setValueAtTime(0.04,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(880,now);o.frequency.setValueAtTime(1100,now+0.06);o.connect(g);o.start(now);o.stop(now+0.15)}else if(t==='task_start'){g.gain.setValueAtTime(0.05,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+0.06);o.frequency.setValueAtTime(784,now+0.12);o.connect(g);o.start(now);o.stop(now+0.25)}else if(t==='contract'){g.gain.setValueAtTime(0.02,now);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(300,now);o.frequency.linearRampToValueAtTime(600,now+0.3);o.connect(g);o.start(now);o.stop(now+0.4)}else if(t==='door'){g.gain.setValueAtTime(0.02,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(200,now);o.frequency.linearRampToValueAtTime(100,now+0.12);o.connect(g);o.start(now);o.stop(now+0.12)}}
function toggleSound(){soundOn=!soundOn;document.getElementById('sndToggle').textContent=soundOn?'🔊':'🔇';if(soundOn)playAmbient();else{if(ambientNode){ambientNode.stop();ambientNode=null}}}
document.getElementById('sndToggle').addEventListener('click',toggleSound)

  'pxh-pm':{n:'pxh-pm',role:'CEO PXH',tier:'T2',c:'#e8c840',g:'male',sk:'#f5e0c8',hc:'#2a2a3a',hs:'short',bc:'#1a1a28',outfit:'suit',oc:'#c8c0b0',acc:'tie',pat:'solid'},
  'pxh-architect':{n:'pxh-architect',role:'Architect',tier:'T3',c:'#bc8cff',g:'female',sk:'#f0c8b0',hc:'#4a3020',hs:'long',bc:'#6b3fa0',outfit:'dress',oc:'#8050c0',acc:'glasses',pat:'solid'},

  'pxh-fix-bugs':{n:'pxh-fix-bugs',role:'Bug Hunter',tier:'T3',c:'#f85149',g:'male',sk:'#d4a580',hc:'#cc3333',hs:'buzz',bc:'#9b2d2d',outfit:'jacket',oc:'#c04040',acc:'badge',pat:'striped'},
  'pxh-qa':{n:'pxh-qa',role:'QA Engineer',tier:'T3',c:'#3fb950',g:'female',sk:'#eed0b8',hc:'#6b3510',hs:'curly',bc:'#1a6b5a',outfit:'dress',oc:'#2a8a6a',acc:'none',pat:'dotted'},
  'pxh-review-code':{n:'pxh-review-code',role:'Reviewer',tier:'T3',c:'#d29922',g:'male',sk:'#e0c098',hc:'#555',hs:'short',bc:'#7a5a10',outfit:'shirt',oc:'#a07820',acc:'tie',pat:'solid'},
  'pxh-devops':{n:'pxh-devops',role:'DevOps',tier:'T3',c:'#58a6ff',g:'male',sk:'#dcc0a0',hc:'#2c3e50',hs:'short',bc:'#1a5080',outfit:'hoodie',oc:'#0a3060',acc:'glasses',pat:'solid'},
  'pxh-ui-ux':{n:'pxh-ui-ux',role:'UI/UX Designer',tier:'T3',c:'#f85149',g:'female',sk:'#f8dcc8',hc:'#6a1b9a',hs:'long',bc:'#8b2550',outfit:'dress',oc:'#b03060',acc:'scarf',pat:'solid'},
  'pxh-save-history':{n:'pxh-save-history',role:'Historian',tier:'T4',c:'#bc8cff',g:'male',sk:'#f0e0c8',hc:'#2a2a3a',hs:'short',bc:'#3a2a5a',outfit:'cardigan',oc:'#5a4a7a',acc:'glasses',pat:'solid'},
  'pxh-opencode':{n:'pxh-opencode',role:'PXHOpenCode',tier:'T3',c:'#00e5ff',g:'male',sk:'#e8dcc8',hc:'#1a1a2a',hs:'short',bc:'#0a2a3a',outfit:'jacket',oc:'#0d4a5a',acc:'glasses',pat:'solid'},
}
const AL=Object.values(AGENTS)
let W,H
const chars={}
AL.forEach(a=>{chars[a.n]={a,state:'idle',x:0,y:0,tx:0,ty:0,dx:0,dy:0,ix:0,iy:0,ws:0,wp:Math.random()*Math.PI*2,ap:Math.random()*Math.PI*2,it:Math.random()*3e3+1e3,ti:null,w:false,by:0,hrw:false,ts:'',tsm:'',_monitorLog:[],_lastEvt:performance.now()}})
const contracts=[],POI=[],plants=[],doneNotifs=[],sysLogs=[]

// ============================================================
// LAYOUT
// ============================================================
function calcLayout(){
  const m=60

  const r1y=H*.10, r2y=H*.26, r3y=H*.46, r4y=H*.78

  const pm=chars['pxh-pm'];pm.dx=W*.5;pm.dy=H*.85;pm.ix=W*.5+30;pm.iy=H*.85+60;pm.x=pm.ix;pm.y=pm.iy;pm.tx=pm.ix;pm.ty=pm.iy

  const mon=['pxh-architect','pxh-expert','pxh-fix-bugs']
  mon.forEach((n,i)=>{const cx=W*.25+i*W*.22,cc=chars[n];cc.dx=cx;cc.dy=r2y;cc.ix=cx+20;cc.iy=r2y+70;cc.x=cc.ix;cc.y=cc.iy;cc.tx=cc.ix;cc.ty=cc.iy})

  const lap=['pxh-qa','pxh-review-code','pxh-devops','pxh-ui-ux']
  lap.forEach((n,i)=>{const cx=W*.16+i*W*.2,cc=chars[n];cc.dx=cx;cc.dy=r3y;cc.ix=cx+25;cc.iy=r3y+70;cc.x=cc.ix;cc.y=cc.iy;cc.tx=cc.ix;cc.ty=cc.iy})

  const sh=chars['pxh-save-history'];sh.dx=W*.22;sh.dy=r4y;sh.ix=W*.22+30;sh.iy=r4y+60;sh.x=sh.ix;sh.y=sh.iy;sh.tx=sh.ix;sh.ty=sh.iy

  const hh=chars['pxh-help'];hh.dx=W*.72;hh.dy=r4y;hh.ix=W*.72+30;hh.iy=r4y+60;hh.x=hh.ix;hh.y=hh.iy;hh.tx=hh.ix;hh.ty=hh.iy

  const oc=chars['pxh-opencode'];oc.dx=W*.40;oc.dy=H*.60;oc.ix=W*.40+25;oc.iy=H*.66+65;oc.x=oc.ix;oc.y=oc.iy;oc.tx=oc.ix;oc.ty=oc.iy;oc.mirror=true

  plants.length=0
  plants.push({x:W*.18,y:H*.23,s:22},{x:W*.82,y:H*.22,s:16},{x:W*.15,y:H*.6,s:20})
  plants.push({x:W*.82,y:H*.58,s:14},{x:W*.5,y:H*.94,s:13},{x:W*.82,y:H*.9,s:11})

  POI.length=0
  POI.push({x:W*.48,y:H*.7,ti:'T3'},{x:W*.3,y:H*.85,ti:'T4'},{x:W*.65,y:H*.85,ti:'T1'},{x:W*.5,y:H*.4,ti:'T3'})

  chars._r={r1y,r2y,r3y,r4y,
    t1t:r4y,t1b:H*.96, t2t:r1y-10,t2b:r2y-5,
    t3t:r2y-10,t3b:r3y+30, t4t:H*.22,t4b:H*.48
  }
}

// ============================================================
// RENDER HELPERS
// ============================================================
const c=document.getElementById('c'),ctx=c.getContext('2d')
function resize(){const w=document.getElementById('canvasWrap');const dpr=window.devicePixelRatio||1;c.width=w.clientWidth*dpr;c.height=w.clientHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);W=w.clientWidth;H=w.clientHeight;calcLayout()}
window.addEventListener('resize',resize);resize()

let fc=0
function hr(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`}
function dc(hex,f=.6){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`}

function drawFloor(y0,y1,label,color){
  const g=ctx.createLinearGradient(0,y0,0,y1)
  g.addColorStop(0,`rgba(${hr(color)},0.06)`);g.addColorStop(0.5,`rgba(${hr(color)},0.03)`);g.addColorStop(1,`rgba(${hr(color)},0.01)`)
  ctx.fillStyle=g;ctx.fillRect(0,y0,W,y1-y0)
  ctx.strokeStyle=`rgba(${hr(color)},0.2)`;ctx.lineWidth=1
  ctx.beginPath();ctx.moveTo(30,y1);ctx.lineTo(W-30,y1);ctx.stroke()
  ctx.fillStyle=color;ctx.globalAlpha=0.5;ctx.font='bold 10px "Segoe UI",sans-serif';ctx.textAlign='left';ctx.fillText(label,10,y0+14);ctx.globalAlpha=1
}

function drawPlant(x,y,s){
  ctx.save();const sw=Math.sin(fc*.015+x)*4;const t=Math.floor(x)%3
  // Pot
  const pw=s*.45,ph=s*.6,pr=s*.5
  ctx.fillStyle='#5a3830'
  ctx.beginPath();ctx.moveTo(x-pw*.6,y);ctx.lineTo(x+pw*.6,y);ctx.lineTo(x+pw*.5,y+ph);ctx.lineTo(x-pw*.5,y+ph);ctx.closePath();ctx.fill()
  ctx.fillStyle='#6b4538'
  ctx.beginPath();ctx.roundRect(x-pr,y-2,pr*2,5,1.5);ctx.fill()
  ctx.fillStyle='#3a2a1a';ctx.fillRect(x-pw*.4,y+1,pw*.8,3)
  // Stem + leaves
  if(t===0){
    // Tall plant (snake plant style)
    ctx.fillStyle='#2d5a1e'
    for(let i=0;i<4;i++){const lx=x+(i-1.5)*s*.15,ly=y-s*.1-i*s*.25,la=Math.sin(fc*.02+i+sw*.1)*.15
      ctx.save();ctx.translate(lx,ly);ctx.rotate(-.15+la+i*.1)
      ctx.beginPath();ctx.ellipse(0,-s*.3,s*.1,s*.35,0,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='#3d7a2e';ctx.beginPath();ctx.ellipse(i*2-3,-s*.38,s*.06,s*.28,0,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='#2d5a1e';ctx.restore()}
    ctx.fillStyle='#4a8a35'
    for(let i=0;i<3;i++){const lx=x+(i-1)*s*.12;ctx.beginPath();ctx.ellipse(lx,y-s*.6-i*s*.25,s*.07,s*.22,Math.sin(fc*.03+i)*.1,0,Math.PI*2);ctx.fill()}
  }else if(t===1){
    // Bushy round plant
    ctx.fillStyle='#2a5a1a';ctx.beginPath();ctx.arc(x+sw,y-s*.3,s*.5,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#3a7a2a';ctx.beginPath();ctx.arc(x+sw+5,y-s*.38,s*.38,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#4a9a3a';ctx.beginPath();ctx.arc(x+sw-4,y-s*.42,s*.32,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#3a8a2f';ctx.beginPath();ctx.arc(x+sw+1,y-s*.5,s*.26,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#55aa44';ctx.beginPath();ctx.arc(x+sw-1,y-s*.58,s*.18,0,Math.PI*2);ctx.fill()
    // Small flowers
    for(let i=0;i<3;i++){const fx=x+sw+(i-1)*8,fy=y-s*.6-i*3;ctx.fillStyle='#ffdd55';ctx.beginPath();ctx.arc(fx,fy,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffaa22';ctx.beginPath();ctx.arc(fx,fy,1.5,0,Math.PI*2);ctx.fill()}
  }else{
    // Leafy tropical plant
    for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2+sw*.05,lx=x+Math.cos(a)*s*.3,ly=y-s*.2+Math.sin(a)*s*.15;ctx.save();ctx.translate(lx,ly);ctx.rotate(a+1.2)
      ctx.fillStyle='#2d6a22';ctx.beginPath();ctx.ellipse(-s*.08,-s*.25,s*.1,s*.3,0,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='#3d8a32';ctx.beginPath();ctx.ellipse(-s*.05,-s*.3,s*.06,s*.25,0,0,Math.PI*2);ctx.fill();ctx.restore()}
    ctx.fillStyle='#4a9a35';ctx.beginPath();ctx.arc(x+sw,y-s*.25,s*.18,0,Math.PI*2);ctx.fill()
  }
  ctx.restore()
}

function drawServerRack(x,y,w,h){
  ctx.save();ctx.fillStyle='#111620';ctx.strokeStyle='#252b38';ctx.lineWidth=1
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();ctx.stroke()
  for(let i=0;i<5;i++){const uy=y+4+i*(h-8)/5,bl=Math.sin(fc*.04+i*1.2)>0;ctx.fillStyle=bl?(i%2?'#0a3a2a':'#0a2a3a'):'#0a111a';ctx.fillRect(x+3,uy,w-6,(h-8)/5-2);ctx.fillStyle=bl?(i%2?'#3fb950':'#58a6ff'):'#1a2a2a';ctx.beginPath();ctx.arc(x+w-7,uy+3,1.5,0,Math.PI*2);ctx.fill()}
  ctx.restore()
}

function drawMonitor(x,y,active){
  ctx.save();const mw=48,mh=30
  ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-mw/2-1,y-1,mw+2,mh+2,3);ctx.fill()
  ctx.fillStyle='#22262d';ctx.fillRect(x-mw/2-1,y+mh-8,mw+2,9)
  ctx.fillStyle='#3a3d44';ctx.beginPath();ctx.arc(x,y+mh-1.5,2,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='#252830';ctx.fillRect(x-3,y+mh,6,5);ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-14,y+mh+4,28,4,2);ctx.fill()
  if(active){
    ctx.fillStyle='#0a1628';ctx.fillRect(x-mw/2+4,y+4,mw-8,mh-13);ctx.strokeStyle='#3fb950';ctx.lineWidth=0.8
    for(let i=0;i<6;i++){const ly=y+7+i*3.2,ind=(i%3)*4;ctx.beginPath();ctx.moveTo(x-mw/2+7+ind,ly);ctx.lineTo(x-mw/2+7+ind+Math.sin(fc*0.07+i)*3+15,ly);ctx.stroke()}
    if(Math.floor(fc/15)%2){ctx.fillStyle='#3fb950';ctx.fillRect(x-mw/2+7+15,y+7,5,2.5)}
    ctx.fillStyle='#3fb950';ctx.beginPath();ctx.arc(x+mw/2-7,y+mh-3,2.5,0,Math.PI*2);ctx.fill()
  }else{
    ctx.fillStyle='#0d1117';ctx.fillRect(x-mw/2+4,y+4,mw-8,mh-13)
    ctx.fillStyle='#1a2a1a';ctx.beginPath();ctx.arc(x+mw/2-7,y+mh-3,2.5,0,Math.PI*2);ctx.fill()
  }
  ctx.restore()
}
function drawKeyboard(x,y){ctx.save();const kw=42,kh=12;ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-kw/2,y,kw,kh,2.5);ctx.fill();ctx.fillStyle='#2a2d34';for(let r=0;r<5;r++){ctx.fillRect(x-kw/2+3,y+2+r*2,kw-6,1.4)}ctx.fillRect(x-12,y+9.5,24,1.4);ctx.restore()}
function drawMouse(x,y){ctx.save();ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.ellipse(x,y,6,7.5,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#2a2d34';ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x,y+3);ctx.stroke();ctx.restore()}
function drawAgentMonitor(x,y,ch){
  if(!ch)return;ctx.save()
  const mw=54,mh=36,ml=ch._monitorLog||[]
  // Screen bezel
  ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-mw/2-1,y-1,mw+2,mh+2,3);ctx.fill()
  ctx.fillStyle='#22262d';ctx.fillRect(x-mw/2-1,y+mh-8,mw+2,9)
  ctx.fillStyle='#3a3d44';ctx.beginPath();ctx.arc(x,y+mh-1.5,2,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='#252830';ctx.fillRect(x-3,y+mh,6,5);ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-14,y+mh+4,28,4,2);ctx.fill()
  // Screen content - scrollable terminal
  ctx.save();ctx.beginPath();ctx.rect(x-mw/2+4,y+3,mw-8,mh-14);ctx.clip()
  ctx.fillStyle='#0a141e';ctx.fillRect(x-mw/2+4,y+3,mw-8,mh-14)
  if(ml.length){
    ml.slice(-6).forEach((entry,i)=>{
      const ly=y+mh-8-(ml.slice(-6).length-1-i)*5
      let c='#8cf';if(entry.s&&entry.s.match(/error|fail|debug|fix/i))c='#f85149'
      else if(entry.s&&entry.s.match(/build|execute|test/i))c='#d29922'
      else if(entry.s&&entry.s.match(/code|write|edit/i))c='#3fb950'
      ctx.fillStyle=c;ctx.font='6px "Consolas",monospace';ctx.textAlign='left'
      const txt=entry.m.length>22?entry.m.slice(0,21)+'…':entry.m
      ctx.fillText(txt,x-mw/2+6,ly)
    })
  }else if(ch.a.n==='pxh-help'||ch.a.n==='pxh-pm'){
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='bold 6px "Consolas",monospace';ctx.textAlign='center'
    ctx.fillText(ch.a.n==='pxh-pm'?'CEO Dashboard':ch.a.n==='pxh-help'?'Help Desk Queue':'Waiting...',x,y+14)
  }
  ctx.restore()
  // Status LED
  const act=ch.state==='typing'||ch.w;ctx.fillStyle=act?'#3fb950':'#1a2a1a';ctx.beginPath();ctx.arc(x+mw/2-7,y+mh-3,2.5,0,Math.PI*2);ctx.fill()
  ctx.restore()
}
function drawLaptop(x,y,active){
  ctx.save();const lw=40,sh=24,bh=8
  ctx.fillStyle='#a8acb4';ctx.beginPath();ctx.roundRect(x-lw/2,y-sh,lw,sh,3);ctx.fill()
  ctx.fillStyle='#161a20';ctx.fillRect(x-lw/2+3,y-sh+4,lw-6,sh-8)
  ctx.fillStyle='#0d1117';ctx.beginPath();ctx.arc(x,y-sh+3,1.2,0,Math.PI*2);ctx.fill()
  if(active){
    ctx.fillStyle='#0a1628';ctx.fillRect(x-lw/2+4,y-sh+7,lw-8,sh-13);ctx.strokeStyle='#58a6ff';ctx.lineWidth=0.8
    for(let i=0;i<5;i++){const ly=y-sh+9+i*2.8;ctx.beginPath();ctx.moveTo(x-lw/2+7,ly);ctx.lineTo(x-lw/2+7+Math.sin(fc*0.06+i)*2+13,ly);ctx.stroke()}
    if(Math.floor(fc/12)%2){ctx.fillStyle='#58a6ff';ctx.fillRect(x-lw/2+7+13,y-sh+9,5,2.5)}
  }else{ctx.fillStyle='#0d1117';ctx.fillRect(x-lw/2+4,y-sh+7,lw-8,sh-13)}
  ctx.fillStyle='#888c94';ctx.fillRect(x-lw/2,y-1,lw,2)
  ctx.fillStyle='#a8acb4';ctx.beginPath();ctx.roundRect(x-lw/2,y+1,lw,bh,1.5);ctx.fill()
  ctx.fillStyle='#2a2d34';ctx.fillRect(x-lw/2+3,y+2,lw-6,3.5);for(let r=0;r<6;r++)ctx.fillRect(x-lw/2+4,y+2.3+r*0.7,lw-8,0.5)
  ctx.fillStyle='#787c84';ctx.beginPath();ctx.roundRect(x-7,y+6,14,2,0.7);ctx.fill()
  ctx.restore()
}

function drawHair(hx,hy,a,g){
  ctx.fillStyle=a.hc;const hs=a.hs||'short';const hr=14
  if(hs==='pony'){
    ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI,Math.PI*2);ctx.fill()
    ctx.fillRect(hx-hr*.9,hy,hr*1.8,4)
    ctx.fillStyle='#dd5599';ctx.fillRect(hx+hr*.25,hy+3,hr*.2,3)
    ctx.fillStyle=a.hc;ctx.beginPath();ctx.moveTo(hx+hr*.4,hy+4);ctx.quadraticCurveTo(hx+hr*1.1,hy-hr*.1,hx+hr*1.2,hy+hr*.4);ctx.quadraticCurveTo(hx+hr*.6,hy+hr*.3,hx+hr*.2,hy+2);ctx.fill()
  }else if(hs==='long'){
    ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI,Math.PI*2);ctx.fill()
    ctx.fillRect(hx-hr,hy,hr*.35,hr*.7);ctx.fillRect(hx+hr*.65,hy,hr*.35,hr*.7)
    ctx.fillRect(hx-hr*.9,hy+hr*.2,hr*.3,hr*.6);ctx.fillRect(hx+hr*.6,hy+hr*.2,hr*.3,hr*.6)
  }else if(hs==='buzz'){
    ctx.beginPath();ctx.arc(hx,hy+2,hr*.9,Math.PI,Math.PI*2);ctx.fill()
  }else if(hs==='spiky'){
    for(let i=-4;i<=4;i++){const sx=hx+i*4;ctx.beginPath();ctx.moveTo(sx-2,hy-8);ctx.lineTo(sx,hy-8-(8+Math.abs(i)*3));ctx.lineTo(sx+2,hy-8);ctx.fill()}
    ctx.beginPath();ctx.arc(hx,hy+1,hr*.9,Math.PI,Math.PI*2);ctx.fill()
  }else if(hs==='curly'){
    ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI,Math.PI*2);ctx.fill()
    for(let i=-3;i<=4;i++){ctx.beginPath();ctx.arc(hx+i*5,hy-4,4.5,0,Math.PI*2);ctx.fill()}
  }else if(hs==='slick'){
    // CEO refined slicked-back with grey temples
    ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI,Math.PI*2);ctx.fill()
    // Grey temple streaks on sides
    ctx.fillStyle='#888899';ctx.fillRect(hx-hr-2,hy-2,5,5);ctx.fillRect(hx+hr-3,hy-2,5,5)
    ctx.fillStyle=a.hc
    // Smooth top
    ctx.fillRect(hx-hr,hy-hr*.15,hr*2,hr*.4)
    // Slick lines
    ctx.fillStyle=dc(a.hc,.75)
    for(let i=0;i<5;i++){ctx.fillRect(hx-hr*.5+i*3.5,hy-hr*.45-i*2.5,hr*.25,hr*.12)}
    ctx.fillStyle=a.hc
  }else if(hs==='messy'){
    // Developer tousled bed-head
    ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI,Math.PI*2);ctx.fill()
    const spikes=[-4,-2.2,-0.5,1.2,2.8,4.2]
    spikes.forEach(sx=>{const sh=5+Math.abs(sx)*2.5
      ctx.beginPath();ctx.moveTo(hx+sx*5-2.5,hy-5);ctx.lineTo(hx+sx*5+(sx>0?2:-2),hy-5-sh);ctx.lineTo(hx+sx*5+2.5,hy-5);ctx.fill()})
    ctx.fillStyle=dc(a.hc,.65);ctx.fillRect(hx-9,hy-7,3,9);ctx.fillRect(hx+6,hy-8,2.5,7)
  }else if(hs==='sidepart'){
    ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI,Math.PI*2);ctx.fill()
    ctx.fillRect(hx-hr,hy-hr*.1,hr*2,hr*.35)
    ctx.strokeStyle=dc(a.hc,.5);ctx.lineWidth=1
    ctx.beginPath();ctx.moveTo(hx-hr*.3,hy-hr*.6);ctx.lineTo(hx-hr*.3,hy+hr*.1);ctx.stroke()
  }else{
    ctx.fillStyle=a.hc;ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI,Math.PI*2);ctx.fill()
    ctx.fillRect(hx-hr*.7,hy-2,hr*1.4,5)
  }
}

function drawComicBubble(cx,cy,msgs,accent){
  if(!msgs)return
  const lines=Array.isArray(msgs)?msgs.slice(-2):[msgs]
  if(!lines.length)return
  ctx.save()
  const maxW=Math.max(...lines.map(m=>m.length))*5.5+24,bh=lines.length*14+16
  ctx.fillStyle='#fff';ctx.strokeStyle='#222';ctx.lineWidth=2
  ctx.beginPath();ctx.roundRect(cx-maxW/2,cy-bh,maxW,bh,8);ctx.fill();ctx.stroke()
  ctx.fillStyle='#fff';ctx.strokeStyle='#222';ctx.beginPath();ctx.moveTo(cx-6,cy-2);ctx.lineTo(cx,cy+8);ctx.lineTo(cx+6,cy-2);ctx.closePath();ctx.fill();ctx.stroke()
  lines.forEach((m,i)=>{ctx.fillStyle='#222';ctx.font='bold 10px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText(m,cx,cy-bh+16+i*14)})
  ctx.restore()
}

function drawOutfit(a,bt,bb,bw,g){
  const oc=a.oc||a.bc;
  // Outfit details
  if(a.outfit==='polo'){
    ctx.fillStyle=oc;ctx.fillRect(-bw+2,bt+4,bw*2-4,3)
    ctx.fillStyle='#ddd';ctx.beginPath();ctx.arc(0,bt+12,1.5,0,Math.PI*2);ctx.fill()
  }else if(a.outfit==='suit'){
    ctx.fillStyle=oc;ctx.beginPath();ctx.moveTo(-bw+1,bt);ctx.lineTo(-bw+4,bt+8);ctx.lineTo(-bw+1,bt+16);ctx.lineTo(-bw+1,bt);ctx.fill()
    ctx.beginPath();ctx.moveTo(bw-1,bt);ctx.lineTo(bw-4,bt+8);ctx.lineTo(bw-1,bt+16);ctx.lineTo(bw-1,bt);ctx.fill()
    ctx.fillStyle=a.sk;ctx.fillRect(-2,bt+2,4,3)
    // Pocket square (left chest)
    ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(-bw+5,bt+5);ctx.lineTo(-bw+7,bt+2);ctx.lineTo(-bw+9,bt+6);ctx.lineTo(-bw+5,bt+5);ctx.fill()
    // Gold buttons
    ctx.fillStyle='#d4a020';ctx.beginPath();ctx.arc(-bw+6,bt+14,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bw-6,bt+14,1.2,0,Math.PI*2);ctx.fill()
  }else if(a.outfit==='blazer'){
    ctx.fillStyle=oc;ctx.beginPath();ctx.moveTo(-bw+1,bt);ctx.lineTo(-bw+5,bt+10);ctx.lineTo(-bw+1,bt+18);ctx.lineTo(-bw+1,bt);ctx.fill()
    ctx.beginPath();ctx.moveTo(bw-1,bt);ctx.lineTo(bw-5,bt+10);ctx.lineTo(bw-1,bt+18);ctx.lineTo(bw-1,bt);ctx.fill()
  }else if(a.outfit==='hoodie'){
    ctx.fillStyle=oc;ctx.beginPath();ctx.arc(0,bt+2,bw*.6,Math.PI,0);ctx.fill()
    ctx.strokeStyle=dc(oc,.5);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-2,bt+4);ctx.lineTo(-2,bt+14);ctx.stroke()
    ctx.beginPath();ctx.moveTo(2,bt+4);ctx.lineTo(2,bt+14);ctx.stroke()
  }else if(a.outfit==='jacket'){
    ctx.fillStyle=oc;ctx.fillRect(-bw+1,bt,bw*2-2,4)
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,bt+4);ctx.lineTo(0,bb-2);ctx.stroke()
    if(a.pat==='striped'){ctx.strokeStyle=dc(oc,.6);ctx.lineWidth=.8;for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-bw+3,bt+8+i*5);ctx.lineTo(bw-3,bt+8+i*5);ctx.stroke()}}
  }else if(a.outfit==='dress'){
    // Full A-line dress covering body
    ctx.fillStyle=oc
    ctx.beginPath()
    ctx.moveTo(-bw+2,bt+2)
    ctx.lineTo(bw-2,bt+2)
    ctx.quadraticCurveTo(bw+1,(bt+bb)/2+2,bw+3,bb+5)
    ctx.lineTo(-bw-3,bb+5)
    ctx.quadraticCurveTo(-bw-1,(bt+bb)/2+2,-bw+2,bt+2)
    ctx.closePath()
    ctx.fill()
    // Waist belt
    ctx.fillStyle=dc(oc,.55)
    ctx.fillRect(-bw+1,(bt+bb)/2-1,bw*2-2,3)
    // Pattern
    if(a.pat==='dotted'){
      ctx.fillStyle='rgba(255,255,255,0.25)'
      for(let i=0;i<5;i++)for(let j=0;j<3;j++){
        ctx.beginPath();ctx.arc(-bw+5+j*7,bt+8+i*5,1.3,0,Math.PI*2);ctx.fill()
      }
    }
  }else if(a.outfit==='shirt'){
    ctx.fillStyle=oc;ctx.fillRect(-bw+2,bt+3,bw*2-4,2)
    ctx.fillStyle='#ddd';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,bt+8+i*6,1.2,0,Math.PI*2);ctx.fill()}
  }else if(a.outfit==='cardigan'){
    ctx.fillStyle=oc;ctx.beginPath();ctx.moveTo(-bw+1,bt);ctx.lineTo(-bw+5,bt+10);ctx.lineTo(-bw+1,bt+18);ctx.lineTo(-bw+1,bt);ctx.fill()
    ctx.beginPath();ctx.moveTo(bw-1,bt);ctx.lineTo(bw-5,bt+10);ctx.lineTo(bw-1,bt+18);ctx.lineTo(bw-1,bt);ctx.fill()
    ctx.fillStyle=a.sk;ctx.fillRect(-3,bt+3,6,3)
    ctx.fillStyle='#ddd';for(let i=0;i<2;i++){ctx.beginPath();ctx.arc(0,bt+10+i*8,1,0,Math.PI*2);ctx.fill()}
  }
  // Accessories
  if(a.acc==='tie'){
    ctx.fillStyle=a.n==='pxh-pm'?'#d4a020':'#c44';ctx.beginPath();ctx.moveTo(-2,bt+2);ctx.lineTo(2,bt+2);ctx.lineTo(3,bt+18);ctx.lineTo(0,bt+20);ctx.lineTo(-3,bt+18);ctx.closePath();ctx.fill()
    // Tie clip for CEO
    if(a.n==='pxh-pm'){ctx.fillStyle='#f0d060';ctx.fillRect(-3,bt+10,6,1.5)}
  }else if(a.acc==='bowtie'){
    ctx.fillStyle='#d29922';ctx.beginPath();ctx.moveTo(-5,bt+3);ctx.lineTo(0,bt+5);ctx.lineTo(5,bt+3);ctx.lineTo(5,bt+7);ctx.lineTo(0,bt+5);ctx.lineTo(-5,bt+7);ctx.closePath();ctx.fill()
  }else if(a.acc==='scarf'){
    ctx.fillStyle='#ff8080';ctx.beginPath();ctx.moveTo(-bw+2,bt+2);ctx.quadraticCurveTo(0,bt+8,bw-2,bt+2);ctx.quadraticCurveTo(bw,bt+10,bw-4,bt+14);ctx.quadraticCurveTo(0,bt+12,-bw+4,bt+14);ctx.quadraticCurveTo(-bw,bt+10,-bw+2,bt+2);ctx.fill()
  }else if(a.acc==='glasses'){
    ctx.strokeStyle='#333';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(-5,bt-3,4,0,Math.PI*2);ctx.stroke()
    ctx.beginPath();ctx.arc(5,bt-3,4,0,Math.PI*2);ctx.stroke()
    ctx.beginPath();ctx.moveTo(-1,bt-3);ctx.lineTo(1,bt-3);ctx.stroke()
  }else if(a.acc==='badge'){
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(bw-5,bt+8,3,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#fff';ctx.font='bold 4px sans-serif';ctx.textAlign='center';ctx.fillText('★',bw-5,bt+9)
  }
}

function drawCharacter(ch){
  const a=ch.a,x=ch.x,y=ch.y,s=ch.state,ph=fc*.05+ch.ap,br=Math.sin(ph*.7)*(s==='idle'?2:0)
  const g=a.g||'male',sk=a.sk,skd=dc(sk,.75),skl=dc(sk,.9)
  ctx.save();ctx.translate(x,y+ch.by)
  const st=s==='idle'||s==='walking'
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(0,st?-2:-8,st?11:17,4,0,0,Math.PI*2);ctx.fill()

  if(st){
    const wc=Math.sin(ph*3),ls=s==='walking'?wc*7:0,bw=g==='female'?11:12
    const las=s==='walking'?Math.sin(ph*4)*7:0
    ctx.fillStyle='#2a2e38';ctx.save();ctx.translate(-5,-20);if(s==='walking')ctx.rotate(las*.04);ctx.fillRect(-3,0,7,18);ctx.fillStyle='#1a1d24';ctx.fillRect(-4,15,10,4);ctx.restore()
    ctx.save();ctx.translate(5,-20);if(s==='walking')ctx.rotate(-las*.04);ctx.fillRect(-4,0,7,18);ctx.fillStyle='#1a1d24';ctx.fillRect(-5,15,10,4);ctx.restore()
    //body
    const bt=-48,bb=-21;ctx.fillStyle=a.bc;ctx.beginPath()
    if(g==='female'){ctx.moveTo(-bw+1,bb);ctx.lineTo(bw-1,bb);ctx.quadraticCurveTo(bw+1,(bt+bb)/2,bw-1,bt);ctx.quadraticCurveTo(-bw+1,(bt+bb)/2,-bw+1,bb)}
    else{ctx.moveTo(-bw,bb);ctx.lineTo(bw,bb);ctx.lineTo(bw-1,bt);ctx.lineTo(-bw+1,bt)}
    ctx.closePath();ctx.fill()
    drawOutfit(a,bt,bb,bw,g)
    ctx.fillStyle=dc(a.bc,.7);ctx.fillRect(-5,bt+2,10,3)
    //arms
    const aas=s==='walking'?Math.sin(ph*2.5)*10:0,aw=g==='female'?5:6
    ctx.fillStyle=a.bc;ctx.save();ctx.translate(-bw,bt+5);ctx.rotate(-.25+aas*.03);ctx.fillRect(-aw/2,0,aw,18);ctx.fillStyle=skl;ctx.beginPath();ctx.arc(0,19,4.5,0,Math.PI*2);ctx.fill();ctx.restore()
    ctx.save();ctx.translate(bw,bt+5);ctx.rotate(.25-aas*.03);ctx.fillRect(-aw/2,0,aw,18);ctx.fillStyle=skl;ctx.beginPath();ctx.arc(0,19,4.5,0,Math.PI*2);ctx.fill();ctx.restore()
    //head
    const hcy=bt-8+br;ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,hcy,13,0,Math.PI*2);ctx.fill()
    ctx.fillStyle=skd;ctx.beginPath();ctx.arc(-13,hcy+1,3.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(13,hcy+1,3.5,0,Math.PI*2);ctx.fill()
    drawHair(0,hcy,a,g)
    const blink=Math.sin(ph*0.35)>.92
    if(blink){
      ctx.strokeStyle='#2a2a3a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-9,hcy);ctx.lineTo(-1,hcy);ctx.stroke()
      ctx.beginPath();ctx.moveTo(1,hcy);ctx.lineTo(9,hcy);ctx.stroke()
    }else{
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-5,hcy-1,4.5,5.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(5,hcy-1,4.5,5.5,0,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='#2a2a3a';ctx.beginPath();ctx.ellipse(-5,hcy-1,3,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(5,hcy-1,3,4,0,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-3,hcy-3.5,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,hcy-3.5,1.5,0,Math.PI*2);ctx.fill()
    }
    ctx.fillStyle='rgba(255,120,120,0.35)';ctx.beginPath();ctx.ellipse(-9,hcy+3,3,2,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(9,hcy+3,3,2,0,0,Math.PI*2);ctx.fill()
    ctx.strokeStyle='#d44';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,hcy+5,3,.15,Math.PI-.15);ctx.stroke()
    //glasses — drawn after head so they appear on top of face
    if(a.acc==='glasses'){ctx.strokeStyle='#333';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(-5,hcy-1,4.5,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(5,hcy-1,4.5,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-0.5,hcy-1);ctx.lineTo(0.5,hcy-1);ctx.stroke()}
    //name label
    const ly=hcy-28;ctx.fillStyle='#1a1a2a';const rw=a.role.length*5+7;ctx.beginPath();ctx.roundRect(-rw/2,ly-10,rw,15,5);ctx.fill();ctx.fillStyle=a.c;ctx.font='bold 9px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText(a.role,0,ly+1)
    //state badge — right of name, blinking
    if(ch.ts&&ch.w&&Math.sin(ph*4)>0){const st=ch.ts.toUpperCase(),sw=st.length*5+8;ctx.fillStyle=`rgba(${hr(a.c)},0.9)`;ctx.beginPath();ctx.roundRect(rw/2+4,ly-6,sw,10,3);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 7px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText(st,rw/2+4+sw/2,ly+1)}
    //bubble
    if(ch.tsm)drawComicBubble(0,hcy-58,ch.tsm,ch._bcol||a.c)
  }else{
    const bw=g==='female'?12:14,bt=-40,bb=-3
    // Legs under desk
    ctx.fillStyle='#282d38';ctx.fillRect(-9,-1,9,5);ctx.fillRect(1,-1,9,5)
    ctx.fillStyle='#1a1d24';ctx.fillRect(-10,2,10,3);ctx.fillRect(1,2,10,3)
    // Arms — behind body (back view, reaching forward)
    if(s==='typing'){const ta=Math.sin(ph*6)*5
      ctx.fillStyle=a.bc
      ctx.save();ctx.translate(-bw+2,bt+6);ctx.rotate(-.45+ta*.015)
      ctx.fillRect(-3,0,6,22+ta)
      ctx.restore()
      ctx.save();ctx.translate(bw-2,bt+6);ctx.rotate(.45-ta*.015)
      ctx.fillRect(-3,0,6,22+ta)
      ctx.restore()
    }
    // Body — back view
    ctx.fillStyle=a.bc;ctx.beginPath()
    ctx.moveTo(-bw,bb);ctx.lineTo(bw,bb)
    ctx.lineTo(bw-2,bt);ctx.lineTo(-bw+2,bt)
    ctx.closePath();ctx.fill()
    // Back clothing — waistline stripe
    ctx.fillStyle=a.oc||dc(a.bc,.6);ctx.fillRect(-bw+1,(bt+bb)/2,bw*2-2,2)
    // Chair behind body
    ctx.fillStyle='#282d38';ctx.fillRect(-15,5,30,7)
    ctx.fillStyle='#222830';ctx.fillRect(-6,-32,12,37)
    ctx.fillStyle='#303840';ctx.fillRect(-5,-35,10,5)
    // Head from behind
    const hcy=bt-7;ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,hcy,13,0,Math.PI*2);ctx.fill()
    ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,hcy,13,0,Math.PI*2);ctx.fill()
    ctx.fillStyle=a.hc;ctx.beginPath();ctx.arc(0,hcy-2,14.5,0,Math.PI*2);ctx.fill()

function addLog(msg,color,agentName){
  if(agentName&&chars[agentName]){
    const ch=chars[agentName];if(!ch._msgs)ch._msgs=[]
    const t=new Date();const ts=`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`
    const s=(ts+' '+msg).length>44?(ts+' '+msg).slice(0,41)+'...':ts+' '+msg
    if(ch._msgs.length&&ch._msgs[ch._msgs.length-1].slice(9)===s.slice(9))ch._msgs.pop()
    ch._msgs.push(s);if(ch._msgs.length>2)ch._msgs.shift()
    ch.tsm=ch._msgs;ch._bcol=color||'#888'
    return
  }
  sysLogs.unshift({msg,color:color||'#888',ts:Date.now()})
  if(sysLogs.length>3)sysLogs.length=3
}

  ctx.fillStyle='#3a2a18';ctx.fillRect(W-30,H*.78,22,H*.16);ctx.strokeStyle='#4a3a28';ctx.lineWidth=1.5;ctx.strokeRect(W-30,H*.78,22,H*.16);ctx.fillStyle='#c8a050';ctx.beginPath();ctx.arc(W-18,H*.86,2,0,Math.PI*2);ctx.fill()

  requestAnimationFrame(animate)
}

function init(){resize();addLog('🏢 Error404Labs - PXH2910','#58a6ff')
  if(state.mode==='sse'){addLog('⚡ SSE — real-time sync','#8b949e');connectSSE()}else{addLog('⚡ Demo — mở qua server để sync TUI','#8b949e');playAmbient()}
  state.startTime=Date.now();requestAnimationFrame(animate)}
c.addEventListener('click',(e)=>{const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;let cl=null,cd=35;AL.forEach(a=>{const ch=chars[a.n],dx=ch.x-mx,dy=ch.y-my,d=Math.sqrt(dx*dx+dy*dy);if(d<cd){cd=d;cl=a}});if(cl){state.agent=cl.n;updateStatus();addLog(`👤 ${cl.role} (${cl.n})`,cl.c);sfx('notification');const ch=chars[cl.n];ch.by=-6;setTimeout(()=>{ch.by=0},300)}})
window.addEventListener('resize',resize);document.addEventListener('DOMContentLoaded',init)
</script>
