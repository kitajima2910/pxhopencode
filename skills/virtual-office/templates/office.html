// Polyfill roundRect for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath()}}

var _dbg=document.createElement('div');_dbg.id='_pxhDebug';_dbg.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#111;color:#0f0;font:11px monospace;padding:6px 10px;max-height:120px;overflow-y:auto;user-select:text;cursor:text;display:none';document.body.appendChild(_dbg)
function _log(m,c){_dbg.style.display='block';_dbg.innerHTML+='<span style="color:'+(c||'#0f0')+'">'+m+'</span><br>'}
window.onerror=function(m,u,l,c,e){_log('ERR: '+m+' @ '+l+':'+c,'#f44');if(e&&e.stack)_log(e.stack.split('\n').slice(0,3).join(' | '),'#f88');return false}

const AudioCtx=window.AudioContext||window.webkitAudioContext
let audioCtx=null,soundOn=true,ambientNode=null
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx}
function playAmbient(){if(!soundOn)return;ensureAudio();if(ambientNode)return;const g=(audioCtx.createGain());g.gain.value=0.01;g.connect(audioCtx.destination);ambientNode={_ns:[],stop(){g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);setTimeout(()=>{ambientNode._ns.forEach(n=>{try{n.stop()}catch{}});ambientNode=null},600)}};const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=55;const gg=audioCtx.createGain();gg.gain.value=0.05;o.connect(gg);gg.connect(g);o.start();ambientNode._ns.push(o)}
function sfx(t){if(!soundOn)return;ensureAudio();const g=audioCtx.createGain();g.connect(audioCtx.destination);const now=audioCtx.currentTime;if(t==='footstep'){g.gain.setValueAtTime(0.015,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.05);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(80+Math.random()*40,now);o.connect(g);o.start(now);o.stop(now+0.05)}else if(t==='notification'){g.gain.setValueAtTime(0.04,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(880,now);o.frequency.setValueAtTime(1100,now+0.06);o.connect(g);o.start(now);o.stop(now+0.15)}else if(t==='task_start'){g.gain.setValueAtTime(0.05,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+0.06);o.frequency.setValueAtTime(784,now+0.12);o.connect(g);o.start(now);o.stop(now+0.25)}else if(t==='contract'){g.gain.setValueAtTime(0.02,now);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(300,now);o.frequency.linearRampToValueAtTime(600,now+0.3);o.connect(g);o.start(now);o.stop(now+0.4)}else if(t==='door'){g.gain.setValueAtTime(0.02,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(200,now);o.frequency.linearRampToValueAtTime(100,now+0.12);o.connect(g);o.start(now);o.stop(now+0.12)}}
function toggleSound(){soundOn=!soundOn;document.getElementById('sndToggle').textContent=soundOn?'🔊':'🔇';if(soundOn)playAmbient();else{if(ambientNode){ambientNode.stop();ambientNode=null}}}
document.getElementById('sndToggle').addEventListener('click',toggleSound)

const AGENTS={
  'pxh-help':{n:'pxh-help',role:'Help Desk',tier:'T1',c:'#58a6ff',g:'female',sk:'#f5d5c0',hc:'#3a2a1a',hs:'pony',bc:'#1a5c8a'},
  'pxh-pm':{n:'pxh-pm',role:'CEO - PXH',tier:'T2',c:'#d29922',g:'male',sk:'#e8c8a0',hc:'#1a1a2e',hs:'short',bc:'#8b6914'},
  'pxh-architect':{n:'pxh-architect',role:'Architect',tier:'T3',c:'#bc8cff',g:'female',sk:'#f0c8b0',hc:'#4a3020',hs:'long',bc:'#6b3fa0'},
  'pxh-expert':{n:'pxh-expert',role:'Developer',tier:'T3',c:'#3fb950',g:'male',sk:'#edc8a8',hc:'#2a2a3a',hs:'spiky',bc:'#2a7a3f'},
  'pxh-fix-bugs':{n:'pxh-fix-bugs',role:'Bug Hunter',tier:'T3',c:'#f85149',g:'male',sk:'#d4a580',hc:'#cc3333',hs:'buzz',bc:'#9b2d2d'},
  'pxh-qa':{n:'pxh-qa',role:'QA Engineer',tier:'T3',c:'#3fb950',g:'female',sk:'#eed0b8',hc:'#6b3510',hs:'curly',bc:'#1a6b5a'},
  'pxh-review-code':{n:'pxh-review-code',role:'Reviewer',tier:'T3',c:'#d29922',g:'male',sk:'#e0c098',hc:'#555',hs:'short',bc:'#7a5a10'},

}
const AL=Object.values(AGENTS)
let W,H
const chars={}
AL.forEach(a=>{chars[a.n]={a,state:'idle',x:0,y:0,tx:0,ty:0,dx:0,dy:0,ix:0,iy:0,ws:0,wp:Math.random()*Math.PI*2,ap:Math.random()*Math.PI*2,it:Math.random()*8e3+4e3,ti:null,w:false,by:0,hrw:false,ts:'',tsm:''}})
const contracts=[],POI=[],plants=[],doneNotifs=[]

// ============================================================
// LAYOUT
// ============================================================
function calcLayout(){
  W=c.width;H=c.height
  const m=60,ah=H*.96
  const t4H=ah*.16,t3H=ah*.42,t2H=ah*.18,t1H=ah*.16,fg=ah*.02
  let y=H*.02
  const t4t=y,t4b=t4t+t4H;y=t4b+fg
  const t3t=y,t3b=t3t+t3H;y=t3b+fg
  const t2t=y,t2b=t2t+t2H;y=t2b+fg
  const t1t=y,t1b=t1t+t1H

  const topR=['pxh-architect','pxh-expert','pxh-fix-bugs']
  const botR=['pxh-qa','pxh-review-code','pxh-devops','pxh-ui-ux']
  const tryY=t3t+t3H*.25,bryY=t3t+t3H*.72
  const dW=(W-m*2)/4
  topR.forEach((n,i)=>{const cx=m+dW*(i+.5)+dW*.25,cc=chars[n];cc.dx=cx;cc.dy=tryY;cc.ix=cx+20;cc.iy=tryY+20;cc.x=cc.ix;cc.y=cc.iy;cc.tx=cc.ix;cc.ty=cc.iy})
  botR.forEach((n,i)=>{const cx=m+dW*(i+.5)+dW*.125,cc=chars[n];cc.dx=cx;cc.dy=bryY;cc.ix=cx+25;cc.iy=bryY+30;cc.x=cc.ix;cc.y=cc.iy;cc.tx=cc.ix;cc.ty=cc.iy})
  const pm=chars['pxh-pm'];pm.dx=W*.5;pm.dy=t2t+t2H*.4;pm.ix=W*.5+30;pm.iy=t2t+t2H*.4+20;pm.x=pm.ix;pm.y=pm.iy;pm.tx=pm.ix;pm.ty=pm.iy
  const h=chars['pxh-help'];h.dx=W*.25;h.dy=t1t+t1H*.4;h.ix=W*.25+30;h.iy=t1t+t1H*.4+20;h.x=h.ix;h.y=h.iy;h.tx=h.ix;h.ty=h.iy
  const s=chars['pxh-save-history'];s.dx=W*.5;s.dy=t4t+t4H*.5;s.ix=W*.5+25;s.iy=t4t+t4H*.5+10;s.x=s.ix;s.y=s.iy;s.tx=s.ix;s.ty=s.iy

  plants.length=0
  plants.push({x:m*.3,y:t1t+t1H*.3,s:20});plants.push({x:W-m*.3,y:t1t+t1H*.55,s:16})
  plants.push({x:m*.5,y:t3t+t3H*.5,s:24});plants.push({x:W-m*.5,y:t3t+t3H*.5,s:18})
  plants.push({x:W-m*.4,y:t4t+t4H*.65,s:14});plants.push({x:m*.7,y:t2t+t2H*.6,s:15})

  POI.length=0
  POI.push({x:W*.82,y:t2t+t2H*.5,ti:'T2'});POI.push({x:W*.28,y:t2t+t2H*.6,ti:'T2'})
  POI.push({x:m*.5,y:t3t+t3H*.5,ti:'T3'});POI.push({x:W-m*.5,y:t3t+t3H*.5,ti:'T3'})
  POI.push({x:m*.3,y:t1t+t1H*.5,ti:'T1'});POI.push({x:W-40,y:t1t+t1H*.5,ti:'T1'})
  POI.push({x:W*.3,y:t3t+t3H*.4,ti:'T3'});POI.push({x:W*.7,y:t3t+t3H*.4,ti:'T3'})

  chars._r={t1t,t1b,t2t,t2b,t3t,t3b,t4t,t4b,fg}
}

// ============================================================
const c=document.getElementById('c'),ctx=c.getContext('2d')
function resize(){const w=document.getElementById('canvasWrap');const dpr=window.devicePixelRatio||1;c.width=w.clientWidth*dpr;c.height=w.clientHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);W=w.clientWidth;H=w.clientHeight;calcLayout()}
window.addEventListener('resize',resize);resize()

let fc=0
function hr(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`}
function dc(hex,f=.6){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`}

function drawFloor(y0,y1,label,color){
  const g=ctx.createLinearGradient(0,y0,0,y1)
  g.addColorStop(0,`rgba(${hr(color)},0.06)`);g.addColorStop(0.5,`rgba(${hr(color)},0.03)`);g.addColorStop(1,`rgba(${hr(color)},0.01)`)
  ctx.fillStyle=g;ctx.fillRect(0,y0,W,y1-y0)
  ctx.strokeStyle=`rgba(${hr(color)},0.2)`;ctx.lineWidth=1
  ctx.beginPath();ctx.moveTo(30,y1);ctx.lineTo(W-30,y1);ctx.stroke()
  ctx.fillStyle=color;ctx.globalAlpha=0.5;ctx.font='bold 10px "Segoe UI",sans-serif';ctx.textAlign='left';ctx.fillText(label,10,y0+14);ctx.globalAlpha=1
}

function drawPlant(x,y,s){
  ctx.save();const sw=Math.sin(fc*.015+x)*2
  ctx.fillStyle='#3a2a1a';ctx.beginPath();ctx.moveTo(x-s*.25,y);ctx.lineTo(x+s*.25,y);ctx.lineTo(x+s*.2,y+s*.35);ctx.lineTo(x-s*.2,y+s*.35);ctx.closePath();ctx.fill()
  ctx.fillStyle='#3a6a2f';ctx.beginPath();ctx.arc(x+sw,y-s*.12,s*.35,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='#4a8a3f';ctx.beginPath();ctx.arc(x+sw+3,y-s*.22,s*.22,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='#2a5a1f';ctx.beginPath();ctx.arc(x+sw-2,y-s*.28,s*.18,0,Math.PI*2);ctx.fill()
  ctx.restore()
}

function drawServerRack(x,y,w,h){
  ctx.save();ctx.fillStyle='#111620';ctx.strokeStyle='#252b38';ctx.lineWidth=1
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();ctx.stroke()
  for(let i=0;i<5;i++){const uy=y+4+i*(h-8)/5,bl=Math.sin(fc*.04+i*1.2)>0;ctx.fillStyle=bl?(i%2?'#0a3a2a':'#0a2a3a'):'#0a111a';ctx.fillRect(x+3,uy,w-6,(h-8)/5-2);ctx.fillStyle=bl?(i%2?'#3fb950':'#58a6ff'):'#1a2a2a';ctx.beginPath();ctx.arc(x+w-7,uy+3,1.5,0,Math.PI*2);ctx.fill()}
  ctx.restore()
}

function drawMonitor(x,y,active){
  ctx.save();const mw=36,mh=22
  ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-mw/2-1,y-1,mw+2,mh+2,2);ctx.fill()
  ctx.fillStyle='#22262d';ctx.fillRect(x-mw/2-1,y+mh-6,mw+2,7)
  ctx.fillStyle='#3a3d44';ctx.beginPath();ctx.arc(x,y+mh-1,1.5,0,Math.PI*2);ctx.fill() // brand dot
  ctx.fillStyle='#252830';ctx.fillRect(x-2,y+mh,4,4);ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-11,y+mh+3,22,3,1.5);ctx.fill()
  if(active){ctx.fillStyle='#0a1628';ctx.fillRect(x-mw/2+3,y+3,mw-6,mh-10);ctx.strokeStyle='#3fb950';ctx.lineWidth=0.7;for(let i=0;i<5;i++){const ly=y+5+i*2.5,ind=(i%3)*3;ctx.beginPath();ctx.moveTo(x-mw/2+5+ind,ly);ctx.lineTo(x-mw/2+5+ind+Math.sin(fc*.07+i)*3+11,ly);ctx.stroke()}if(Math.floor(fc/15)%2){ctx.fillStyle='#3fb950';ctx.fillRect(x-mw/2+5+11,y+5,4,2)}ctx.fillStyle='#3fb950';ctx.beginPath();ctx.arc(x+mw/2-6,y+mh-2,1.5,0,Math.PI*2);ctx.fill()}
  else{ctx.fillStyle='#0d1117';ctx.fillRect(x-mw/2+3,y+3,mw-6,mh-10);ctx.fillStyle='#1a2a1a';ctx.beginPath();ctx.arc(x+mw/2-6,y+mh-2,1.5,0,Math.PI*2);ctx.fill()}
  ctx.restore()
}
function drawKeyboard(x,y){ctx.save();const kw=32,kh=9;ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-kw/2,y,32,kh,2);ctx.fill();ctx.fillStyle='#2a2d34';for(let r=0;r<4;r++){ctx.fillRect(x-kw/2+2,y+2+r*1.8,kw-4,1.2)}ctx.fillRect(x-8,y+7,16,1.2);ctx.restore()}
function drawMouse(x,y){ctx.save();ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.ellipse(x,y,4.5,5.5,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#2a2d34';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x,y-2);ctx.lineTo(x,y+2);ctx.stroke();ctx.restore()}
function drawLaptop(x,y,active){
  ctx.save();const lw=29,sh=18,bh=6
  ctx.fillStyle='#a8acb4';ctx.beginPath();ctx.roundRect(x-lw/2,y-sh,lw,sh,2);ctx.fill()
  ctx.fillStyle='#161a20';ctx.fillRect(x-lw/2+2,y-sh+3,lw-4,sh-6)
  ctx.fillStyle='#0d1117';ctx.beginPath();ctx.arc(x,y-sh+2,1,0,Math.PI*2);ctx.fill()
  if(active){ctx.fillStyle='#0a1628';ctx.fillRect(x-lw/2+3,y-sh+5,lw-6,sh-9);ctx.strokeStyle='#58a6ff';ctx.lineWidth=0.7;for(let i=0;i<4;i++){const ly=y-sh+7+i*3;ctx.beginPath();ctx.moveTo(x-lw/2+5,ly);ctx.lineTo(x-lw/2+5+Math.sin(fc*.06+i)*2+9,ly);ctx.stroke()}if(Math.floor(fc/12)%2){ctx.fillStyle='#58a6ff';ctx.fillRect(x-lw/2+5+9,y-sh+7,4,2)}}
  else{ctx.fillStyle='#0d1117';ctx.fillRect(x-lw/2+3,y-sh+5,lw-6,sh-9)}
  ctx.fillStyle='#888c94';ctx.fillRect(x-lw/2,y-.5,lw,1.5)
  ctx.fillStyle='#a8acb4';ctx.beginPath();ctx.roundRect(x-lw/2,y+1,lw,bh,1);ctx.fill()
  ctx.fillStyle='#2a2d34';ctx.fillRect(x-lw/2+2,y+2,lw-4,3);ctx.fillStyle='#3a3d44';for(let r=0;r<5;r++)ctx.fillRect(x-lw/2+3,y+2.2+r*.5,lw-6,.35)
  ctx.fillStyle='#787c84';ctx.beginPath();ctx.roundRect(x-5,y+5.3,10,1.5,.5);ctx.fill()
  ctx.restore()
}

function drawHair(hx,hy,a,g){
  ctx.fillStyle=a.hc;const hs=a.hs||'short'
  if(hs==='pony'){ctx.beginPath();ctx.arc(hx,hy-1,9.5,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle='#cc4488';ctx.fillRect(hx-8,hy+2,16,2);ctx.fillStyle=a.hc;ctx.beginPath();ctx.moveTo(hx+4,hy+3);ctx.quadraticCurveTo(hx+12,hy-2,hx+14,hy+6);ctx.quadraticCurveTo(hx+8,hy+4,hx+2,hy+2);ctx.fill()}

function moveChar(ch,tx,ty,sp){ch.tx=tx;ch.ty=ty;ch.ws=sp||1.5;if(ch.state!=='walking'){ch.state='walking';ch.wp=0}}
function startTyping(ch){const dtx=ch.dx,dty=ch.dy+16;const dist=Math.sqrt((ch.x-dtx)**2+(ch.y-dty)**2)
  if(dist>20){moveChar(ch,dtx,dty,2);ch.w=true;const ck=setInterval(()=>{if(!ch.w){clearInterval(ck);return};const d=Math.sqrt((ch.x-dtx)**2+(ch.y-dty)**2);if(d<6||ch.state!=='walking'){clearInterval(ck);if(!ch.w)return;ch.state='typing';ch.x=dtx;ch.y=dty;ch.tx=ch.x;ch.ty=ch.y;if(ch.ti)clearInterval(ch.ti);ch.ti=setInterval(()=>{if(ch.state!=='typing'||!ch.w){clearInterval(ch.ti);ch.ti=null;return}},150+Math.random()*200)}},100)}
  else{if(!ch.w)return;ch.state='typing';ch.x=dtx;ch.y=dty;ch.tx=ch.x;ch.ty=ch.y;ch.w=true;if(ch.ti)clearInterval(ch.ti);ch.ti=setInterval(()=>{if(ch.state!=='typing'||!ch.w){clearInterval(ch.ti);ch.ti=null;return}},150+Math.random()*200)}}
function stopTyping(ch){ch.state='idle';ch.w=false;ch.hrw=false;if(ch.ti){clearInterval(ch.ti);ch.ti=null};ch.it=performance.now()+2000;moveChar(ch,ch.ix,ch.iy,1)}
function highlightAgent(name){const now=performance.now();if(!state._lt||(now-state._lt)>1000){AL.forEach(a=>{if(a.n!==name){const oc=chars[a.n];if(oc&&oc.w)stopTyping(oc)}})};state._lt=now;const ch=chars[name];if(!ch)return;ch.hrw=true;if(ch.state!=='typing')startTyping(ch)}
function showDoneNotif(x,y,agentName,color){doneNotifs.push({x,y,agentName,color,life:70,sy:y})}
function randomWander(ch){if(ch.state!=='idle'||ch.w)return;const r=chars._r,a=ch.a;let wx,wy;const roll=Math.random()
  if(roll<.3&&POI.length>0){const p=POI[Math.floor(Math.random()*POI.length)];wx=p.x+(Math.random()-.5)*20;wy=p.y+(Math.random()-.5)*10}
  else if(roll<.6){const cols=AL.filter(c=>c.tier===a.tier&&c.n!==a.n);if(cols.length>0){const cl=chars[cols[Math.floor(Math.random()*cols.length)].n];wx=cl.x+(Math.random()-.5)*30+20;wy=cl.y+(Math.random()-.5)*15}else{wx=ch.ix+(Math.random()-.5)*60;wy=ch.iy+(Math.random()-.5)*20}}
  else{wx=ch.ix+(Math.random()-.5)*80;wy=ch.iy+(Math.random()-.5)*30}
  if(a.tier==='T1')wy=Math.min(Math.max(wy,r.t1t+20),r.t1b-20);else if(a.tier==='T2')wy=Math.min(Math.max(wy,r.t2t+20),r.t2b-20);else if(a.tier==='T3')wy=Math.min(Math.max(wy,r.t3t+30),r.t3b-30);else wy=Math.min(Math.max(wy,r.t4t+20),r.t4b-20)
  wx=Math.max(60,Math.min(W-60,wx));moveChar(ch,wx,wy,.8+Math.random()*.5);sfx('footstep')
  setTimeout(()=>{if(ch&&ch.state==='walking'&&!ch.w){ch.state='idle';ch.it=performance.now()+4000+Math.random()*6000;setTimeout(()=>{if(ch&&ch.state==='idle'&&!ch.w)moveChar(ch,ch.ix,ch.iy,1)},3000)}},1500)
}

const state={workflow:'—',phase:'—',agent:null,retry:'0/3',elapsed:0,startTime:Date.now(),mode:location.protocol==='http:'||location.protocol==='https:'?'sse':'demo',sseConnected:false,lastRealEvent:0,lastTick:-1,_lt:0}
function addLog(msg,color){const ct=document.getElementById('logOverlay');const d=document.createElement('div');d.className='log-item';d.style.borderLeftColor=color||'#888';const t=new Date();d.textContent=`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')} ${msg}`;ct.insertBefore(d,ct.firstChild);if(ct.children.length>8)ct.removeChild(ct.lastChild)}
function updateStatus(){document.getElementById('wfVal').textContent=state.workflow;document.getElementById('phVal').textContent=state.phase;document.getElementById('agVal').textContent=state.agent||'—';const el=document.getElementById('rtVal');if(el)el.textContent=state.retry}
function updateElapsed(){const ms=Date.now()-state.startTime;const h=String(Math.floor(ms/3600000)).padStart(2,'0'),m=String(Math.floor((ms%3600000)/60000)).padStart(2,'0'),s=String(Math.floor((ms%60000)/1000)).padStart(2,'0');document.getElementById('elVal').textContent=`${h}:${m}:${s}`}

function processEvent(event){
  const isReal=event.type!=='agent_status'&&event.type!=='connected'
  if(isReal){state.lastRealEvent=performance.now();document.getElementById('modeTxt').textContent='🔴 Live';document.getElementById('modeTxt').style.opacity='0.8'}
  const tc={T0:'#8b949e',T1:'#58a6ff',T2:'#d29922',T3:'#3fb950',T4:'#bc8cff'},ac=event.tier_from||event.tier_to||'T1',color=tc[ac]||'#888'
  if(event.type==='task_start'||event.type==='phase_change'){
    state.agent=event.to||event.from||state.agent;if(event.phase)state.phase=event.phase;if(event.workflow)state.workflow=event.workflow;if(event.retry)state.retry=event.retry
    if(state.agent)highlightAgent(state.agent)
    if(event.tier_from&&event.tier_to){const r=chars._r,tm={T0:r.t1t+10,T1:(r.t1t+r.t1b)/2,T2:(r.t2t+r.t2b)/2,T3:(r.t3t+r.t3b)/2,T4:(r.t4t+r.t4b)/2};contracts.push({x:W*.5,y:tm[event.tier_from]||0,ty:tm[event.tier_to]||0,alpha:1,emoji:'📄',life:70});sfx('contract')}
    addLog(`[${ac}] ${event.message||event.type}`,color);if(isReal)sfx('notification')
  }else if(event.type==='agent_state'){
    const ag=event.agent,ch=chars[ag];if(ch){ch.ts=event.tuiState||event.state||'';ch.tsm=event.message||'';if(!ch.w&&ch.state!=='typing'){ch.hrw=true;startTyping(ch)};state.agent=ag;if(event.tuiState)state.phase=event.tuiState;addLog(`[${AGENTS[ag]?.tier||'?'}] ${ag}: ${event.tuiState||''}`,AGENTS[ag]?.c||'#888')}
    updateStatus();return
  }else if(event.type==='task_end'){
    const ch=chars[event.from||event.to];if(ch){stopTyping(ch);if(event.status!=='fail')showDoneNotif(ch.x,ch.y-30,ch.a.role,ch.a.c)}
    addLog(`[${ac}] ${event.message||(event.status==='fail'?'✗ Failed':'✓ Done')}`,event.status==='fail'?'#f85149':color)
  }else if(event.type==='contract'){if(event.tier_from&&event.tier_to){const r=chars._r,tm={T0:r.t1t+10,T1:(r.t1t+r.t1b)/2,T2:(r.t2t+r.t2b)/2,T3:(r.t3t+r.t3b)/2,T4:(r.t4t+r.t4b)/2};contracts.push({x:W*.5,y:tm[event.tier_from]||0,ty:tm[event.tier_to]||0,alpha:1,emoji:'📄',life:70});sfx('contract')}}else if(!isReal)return;else addLog(event.message||'','#8b949e')
  updateStatus()
}

function connectSSE(){const es=new EventSource('/events');es.onopen=()=>{state.sseConnected=true;state.lastRealEvent=performance.now();document.getElementById('modeTxt').textContent='⚪ Idle';document.getElementById('modeTxt').style.opacity='0.5';addLog('🔴 SSE connected','#58a6ff');playAmbient();sfx('door')};es.onmessage=(e)=>{try{const ev=JSON.parse(e.data);if(ev.type==='connected')return;processEvent(ev)}catch{}};es.onerror=()=>{state.sseConnected=false;document.getElementById('modeTxt').textContent='⚠️ Reconnecting...';document.getElementById('modeTxt').style.opacity='0.4';setTimeout(connectSSE,3000)}}

// ============================================================
// MAIN LOOP
// ============================================================
function animate(now){fc++;updateElapsed()
  if(!chars)return
  if(state.mode==='sse'&&state.sseConnected&&now-state.lastRealEvent>15000){document.getElementById('modeTxt').textContent='⚪ Idle';document.getElementById('modeTxt').style.opacity='0.5'}

  AL.forEach(a=>{const ch=chars[a.n];ch.ap+=.03
    if(ch.state==='walking'){const dx=ch.tx-ch.x,dy=ch.ty-ch.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<2){ch.x=ch.tx;ch.y=ch.ty;ch.state=ch.w?'typing':'idle';if(!ch.w)ch.it=now+3000+Math.random()*5000}else{const step=ch.ws*1.5;ch.x+=dx/dist*step;ch.y+=dy/dist*step;ch.wp+=step*.3;if(fc%18===0)sfx('footstep')}}
    if(ch.state==='idle'&&now>ch.it&&!ch.w){if(Math.random()<.006)randomWander(ch)}
  })

  for(let i=contracts.length-1;i>=0;i--){const ct=contracts[i];ct.y+=(ct.ty-ct.y)*.06;ct.life--;ct.alpha=Math.min(1,ct.life/35);if(ct.life<=0)contracts.splice(i,1)}
  for(let i=doneNotifs.length-1;i>=0;i--){const dn=doneNotifs[i];dn.life--;dn.y=dn.sy-(70-dn.life)*.5;if(dn.life<=0){doneNotifs.splice(i,1);continue}}

  // RENDER
  ctx.clearRect(0,0,W,H)
  const r=chars._r
  // Background gradient
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0d1220');bg.addColorStop(.5,'#0a0f1a');bg.addColorStop(1,'#0d1220');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H)
  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.015)';ctx.lineWidth=.5
  for(let gx=0;gx<W;gx+=40)for(let gy=0;gy<H;gy+=40){ctx.strokeRect(gx,gy,40,40)}

  drawFloor(r.t4t,r.t4b,'T4 — HẠ TẦNG','#bc8cff')
  drawFloor(r.t3t,r.t3b,'T3 — NHÂN CÔNG (7)','#3fb950')
  drawFloor(r.t2t,r.t2b,'T2 — CEO - PXH','#d29922')
  drawFloor(r.t1t,r.t1b,'T1 — GIAO DIỆN','#58a6ff')

  plants.forEach(p=>drawPlant(p.x,p.y,p.s))
  drawServerRack(W*.12,r.t4t+12,28,50);drawServerRack(W*.2,r.t4t+8,28,55);drawServerRack(W*.76,r.t4t+12,28,50);drawServerRack(W*.84,r.t4t+8,28,55);

  // Desks
  ['pxh-architect','pxh-expert','pxh-fix-bugs'].forEach(n=>{const ch=chars[n];if(!ch)return;const act=ch.state==='typing';ctx.fillStyle='#1a1d24';ctx.fillRect(ch.dx+20,ch.dy+10,12,18);ctx.fillStyle='#252830';ctx.fillRect(ch.dx+21,ch.dy+12,10,14);ctx.fillStyle=act?'#3fb950':'#1a2a1a';ctx.beginPath();ctx.arc(ch.dx+26,ch.dy+22,1.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4a3520';ctx.fillRect(ch.dx-22,ch.dy+14,44,5);drawMonitor(ch.dx,ch.dy-2,act);drawKeyboard(ch.dx,ch.dy+16);drawMouse(ch.dx+14,ch.dy+21)})
  ;['pxh-qa','pxh-review-code','pxh-devops','pxh-ui-ux'].forEach(n=>{const ch=chars[n];if(!ch)return;const act=ch.state==='typing';ctx.fillStyle='#4a3520';ctx.fillRect(ch.dx-18,ch.dy+14,36,5);drawLaptop(ch.dx,ch.dy+6,act)})
  // Chairs
  ;AL.forEach(a=>{const ch=chars[a.n],cx=ch.dx,cy=ch.dy+26;ctx.fillStyle='#282d38';ctx.fillRect(cx-9,cy,18,4);ctx.fillStyle='#222830';ctx.fillRect(cx-3,cy-14,6,14);ctx.fillStyle='#303840';ctx.fillRect(cx-2,cy-16,4,2)})
  // PM desk
  const pm=chars['pxh-pm'];ctx.fillStyle='#5a4020';ctx.fillRect(pm.dx-28,pm.dy+14,56,6);drawMonitor(pm.dx,pm.dy-2,pm.state==='typing');drawKeyboard(pm.dx,pm.dy+16);drawMouse(pm.dx+18,pm.dy+21);ctx.fillStyle='#1a1d24';ctx.fillRect(pm.dx+23,pm.dy+10,12,18)
  // Help desk
  const hh=chars['pxh-help'];ctx.fillStyle='#4a3520';ctx.fillRect(hh.dx-22,hh.dy+14,44,6);drawMonitor(hh.dx,hh.dy-2,hh.state==='typing');drawKeyboard(hh.dx,hh.dy+16);drawMouse(hh.dx+14,hh.dy+21)
  // Historian desk
  const sh=chars['pxh-save-history'];ctx.fillStyle='#4a3520';ctx.fillRect(sh.dx-22,sh.dy+14,44,6);drawMonitor(sh.dx,sh.dy-2,sh.state==='typing');drawKeyboard(sh.dx,sh.dy+16);drawMouse(sh.dx+14,sh.dy+21)

  // Contracts
  contracts.forEach(ct=>drawContract(ct.x,ct.y,ct.alpha,ct.emoji))
  // Done notifs
  doneNotifs.forEach(dn=>{if(dn.life<=0)return;const a=Math.min(1,dn.life/25);ctx.save();ctx.globalAlpha=a;const t='✓ Đã Làm Xong',tw=t.length*4+10;ctx.fillStyle='#fff';ctx.strokeStyle='#111';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(dn.x-tw/2,dn.y-7,tw,16,5);ctx.fill();ctx.stroke();ctx.fillStyle='#111';ctx.font='bold 8px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText(t,dn.x,dn.y+3);ctx.restore()})

  // Characters
  const walkers=AL.filter(a=>chars[a.n].state==='walking'||chars[a.n].state==='idle'),workers=AL.filter(a=>chars[a.n].state==='sitting'||chars[a.n].state==='typing')
  walkers.forEach(a=>drawCharacter(chars[a.n]));workers.forEach(a=>drawCharacter(chars[a.n]))

  // Water cooler (T2)
  const wcx=W*.82,wcy=r.t2t+r.t2b*.1;ctx.fillStyle='#1a4060';ctx.fillRect(wcx-5,wcy,10,20);ctx.fillStyle='#58a6ff';ctx.fillRect(wcx-4,wcy-3,8,4);ctx.fillStyle='rgba(88,166,255,0.2)';ctx.fillRect(wcx-3,wcy+2,6,11)
  // Meeting table
  const mtx=W*.28,mty=r.t2t+(r.t2b-r.t2t)*.5;ctx.fillStyle='#4a3520';ctx.fillRect(mtx-22,mty,44,7);ctx.fillStyle='#3a2a18';ctx.fillRect(mtx-20,mty+7,3,8);ctx.fillRect(mtx+17,mty+7,3,8)
  // Whiteboard (T3)
  ctx.fillStyle='#f5f5f0';ctx.fillRect(W-50,r.t3t+15,38,22);ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(W-50,r.t3t+15,38,22);ctx.fillStyle='#58a6ff';ctx.font='5px sans-serif';ctx.textAlign='center';ctx.fillText('// TODO:',W-31,r.t3t+28);ctx.fillStyle='#3fb950';ctx.fillText('✓ Code',W-31,r.t3t+33)
  // Door (T1)
  ctx.fillStyle='#3a2a18';ctx.fillRect(W-35,r.t1t+6,26,r.t1b-r.t1t-10);ctx.strokeStyle='#4a3a28';ctx.lineWidth=1.5;ctx.strokeRect(W-35,r.t1t+6,26,r.t1b-r.t1t-10);ctx.fillStyle='#c8a050';ctx.beginPath();ctx.arc(W-15,r.t1t+(r.t1b-r.t1t)*.5,2.5,0,Math.PI*2);ctx.fill()
  // Wall clock (T2)
  ctx.fillStyle='#f5f5f0';ctx.beginPath();ctx.arc(W*.15,r.t2t+14,10,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#111';ctx.fillRect(W*.15-.5,r.t2t+14-9,1,4);ctx.fillRect(W*.15-.5,r.t2t+14+1,1,4)
  // Wall poster (T1)
  ctx.fillStyle='#2a2a3a';ctx.fillRect(40,r.t1t+8,30,22);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.strokeRect(40,r.t1t+8,30,22);ctx.fillStyle='#fff';ctx.font='5px sans-serif';ctx.textAlign='center';ctx.fillText('SAFETY',55,r.t1t+19);ctx.fillText('FIRST',55,r.t1t+25)

  // Arrows
  const ars=[(r.t4b+r.t3t)/2,(r.t3b+r.t2t)/2,(r.t2b+r.t1t)/2]
  ars.forEach(ay=>{ctx.globalAlpha=Math.sin(fc*.03)*.1+.15;ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('↓',W*.5,ay);ctx.globalAlpha=1})
  requestAnimationFrame(animate)
}

// ============================================================
// INIT
// ============================================================
function init(){resize();addLog('🏢 Error404Labs - PXH2910','#58a6ff')
  if(state.mode==='sse'){addLog('⚡ SSE — real-time sync','#8b949e');connectSSE()}else{addLog('⚡ Demo — mở qua server để sync TUI','#8b949e');playAmbient()}
  state.startTime=Date.now();requestAnimationFrame(animate)}
c.addEventListener('click',(e)=>{const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;let cl=null,cd=35;AL.forEach(a=>{const ch=chars[a.n],dx=ch.x-mx,dy=ch.y-my,d=Math.sqrt(dx*dx+dy*dy);if(d<cd){cd=d;cl=a}});if(cl){state.agent=cl.n;updateStatus();addLog(`👤 ${cl.role} (${cl.n})`,cl.c);sfx('notification');const ch=chars[cl.n];ch.by=-6;setTimeout(()=>{ch.by=0},300)}})
window.addEventListener('resize',resize);document.addEventListener('DOMContentLoaded',init)
</script>
