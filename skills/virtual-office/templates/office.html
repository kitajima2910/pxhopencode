<script>
// Polyfill roundRect for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath()}}

window.onerror=function(){return false}

// SOUND
// ============================================================
const AudioCtx=window.AudioContext||window.webkitAudioContext
let audioCtx=null,soundOn=true,ambientNode=null
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx}
function playAmbient(){if(!soundOn)return;ensureAudio();if(ambientNode)return;const g=(audioCtx.createGain());g.gain.value=0.01;g.connect(audioCtx.destination);ambientNode={_ns:[],stop(){g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);setTimeout(()=>{ambientNode._ns.forEach(n=>{try{n.stop()}catch{}});ambientNode=null},600)}};const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=55;const gg=audioCtx.createGain();gg.gain.value=0.05;o.connect(gg);gg.connect(g);o.start();ambientNode._ns.push(o)}
function sfx(t){if(!soundOn)return;ensureAudio();const g=audioCtx.createGain();g.connect(audioCtx.destination);const now=audioCtx.currentTime;if(t==='footstep'){g.gain.setValueAtTime(0.015,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.05);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(80+Math.random()*40,now);o.connect(g);o.start(now);o.stop(now+0.05)}else if(t==='notification'){g.gain.setValueAtTime(0.04,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(880,now);o.frequency.setValueAtTime(1100,now+0.06);o.connect(g);o.start(now);o.stop(now+0.15)}else if(t==='task_start'){g.gain.setValueAtTime(0.05,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+0.06);o.frequency.setValueAtTime(784,now+0.12);o.connect(g);o.start(now);o.stop(now+0.25)}else if(t==='contract'){g.gain.setValueAtTime(0.02,now);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(300,now);o.frequency.linearRampToValueAtTime(600,now+0.3);o.connect(g);o.start(now);o.stop(now+0.4)}else if(t==='door'){g.gain.setValueAtTime(0.02,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);const o=audioCtx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(200,now);o.frequency.linearRampToValueAtTime(100,now+0.12);o.connect(g);o.start(now);o.stop(now+0.12)}}
function toggleSound(){soundOn=!soundOn;document.getElementById('sndToggle').textContent=soundOn?'🔊':'🔇';if(soundOn)playAmbient();else{if(ambientNode){ambientNode.stop();ambientNode=null}}}
document.getElementById('sndToggle').addEventListener('click',toggleSound)

// ============================================================
// DATA
// ============================================================
const AGENTS={
  'pxh-help':{n:'pxh-help',role:'Help Desk',tier:'T1',c:'#58a6ff',g:'female',sk:'#f5d5c0',hc:'#3a2a1a',hs:'pony',bc:'#1a5c8a'},
  'pxh-pm':{n:'pxh-pm',role:'CEO - PXH',tier:'T2',c:'#d29922',g:'male',sk:'#e8c8a0',hc:'#1a1a2e',hs:'short',bc:'#8b6914'},
  'pxh-architect':{n:'pxh-architect',role:'Architect',tier:'T3',c:'#bc8cff',g:'female',sk:'#f0c8b0',hc:'#4a3020',hs:'long',bc:'#6b3fa0'},
  'pxh-expert':{n:'pxh-expert',role:'Developer',tier:'T3',c:'#3fb950',g:'male',sk:'#edc8a8',hc:'#2a2a3a',hs:'spiky',bc:'#2a7a3f'},
  'pxh-fix-bugs':{n:'pxh-fix-bugs',role:'Bug Hunter',tier:'T3',c:'#f85149',g:'male',sk:'#d4a580',hc:'#cc3333',hs:'buzz',bc:'#9b2d2d'},
  'pxh-qa':{n:'pxh-qa',role:'QA Engineer',tier:'T3',c:'#3fb950',g:'female',sk:'#eed0b8',hc:'#6b3510',hs:'curly',bc:'#1a6b5a'},
  'pxh-review-code':{n:'pxh-review-code',role:'Reviewer',tier:'T3',c:'#d29922',g:'male',sk:'#e0c098',hc:'#555',hs:'short',bc:'#7a5a10'},
  'pxh-devops':{n:'pxh-devops',role:'DevOps',tier:'T3',c:'#58a6ff',g:'male',sk:'#dcc0a0',hc:'#2c3e50',hs:'short',bc:'#1a5080'},
  'pxh-ui-ux':{n:'pxh-ui-ux',role:'UI/UX Designer',tier:'T3',c:'#f85149',g:'female',sk:'#f8dcc8',hc:'#6a1b9a',hs:'long',bc:'#8b2550'},
  'pxh-save-history':{n:'pxh-save-history',role:'Historian',tier:'T4',c:'#bc8cff',g:'male',sk:'#e8c8a0',hc:'#666',hs:'buzz',bc:'#4a2a6b'},
}
const AL=Object.values(AGENTS)
let W,H
const chars={}
AL.forEach(a=>{chars[a.n]={a,state:'idle',x:0,y:0,tx:0,ty:0,dx:0,dy:0,ix:0,iy:0,ws:0,wp:Math.random()*Math.PI*2,ap:Math.random()*Math.PI*2,it:Math.random()*3e3+1e3,ti:null,w:false,by:0,hrw:false,ts:'',tsm:''}})
const contracts=[],POI=[],plants=[],doneNotifs=[]

// ============================================================
// LAYOUT
// ============================================================
function calcLayout(){
  W=c.width;H=c.height
  const m=60

  const r1y=H*.10, r2y=H*.32, r3y=H*.54, r4y=H*.78

  const pm=chars['pxh-pm'];pm.dx=W*.75;pm.dy=r1y;pm.ix=W*.75+30;pm.iy=r1y+60;pm.x=pm.ix;pm.y=pm.iy;pm.tx=pm.ix;pm.ty=pm.iy

  const mon=['pxh-architect','pxh-expert','pxh-fix-bugs']
  mon.forEach((n,i)=>{const cx=W*.25+i*W*.22,cc=chars[n];cc.dx=cx;cc.dy=r2y;cc.ix=cx+20;cc.iy=r2y+70;cc.x=cc.ix;cc.y=cc.iy;cc.tx=cc.ix;cc.ty=cc.iy})

  const lap=['pxh-qa','pxh-review-code','pxh-devops','pxh-ui-ux']
  lap.forEach((n,i)=>{const cx=W*.16+i*W*.2,cc=chars[n];cc.dx=cx;cc.dy=r3y;cc.ix=cx+25;cc.iy=r3y+70;cc.x=cc.ix;cc.y=cc.iy;cc.tx=cc.ix;cc.ty=cc.iy})

  const sh=chars['pxh-save-history'];sh.dx=W*.22;sh.dy=r4y;sh.ix=W*.22+30;sh.iy=r4y+60;sh.x=sh.ix;sh.y=sh.iy;sh.tx=sh.ix;sh.ty=sh.iy

  const hh=chars['pxh-help'];hh.dx=W*.72;hh.dy=r4y;hh.ix=W*.72+30;hh.iy=r4y+60;hh.x=hh.ix;hh.y=hh.iy;hh.tx=hh.ix;hh.ty=hh.iy

  plants.length=0
  plants.push({x:W*.18,y:H*.23,s:22},{x:W*.93,y:H*.22,s:16},{x:W*.15,y:H*.6,s:20})
  plants.push({x:W*.94,y:H*.55,s:14},{x:W*.5,y:H*.94,s:13},{x:W*.82,y:H*.9,s:11})

  POI.length=0
  POI.push({x:W*.48,y:H*.7,ti:'T3'},{x:W*.3,y:H*.85,ti:'T4'},{x:W*.65,y:H*.85,ti:'T1'},{x:W*.5,y:H*.4,ti:'T3'})

  chars._r={r1y,r2y,r3y,r4y,
    t1t:r4y,t1b:H*.96, t2t:r1y-10,t2b:r2y-5,
    t3t:r2y-10,t3b:r3y+30, t4t:H*.22,t4b:H*.48
  }
}

// ============================================================
// RENDER HELPERS
// ============================================================
const c=document.getElementById('c'),ctx=c.getContext('2d')
function resize(){const w=document.getElementById('canvasWrap');const dpr=window.devicePixelRatio||1;c.width=w.clientWidth*dpr;c.height=w.clientHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);W=w.clientWidth;H=w.clientHeight;calcLayout()}
window.addEventListener('resize',resize);resize()

let fc=0
function hr(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`}
function dc(hex,f=.6){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`}

function drawFloor(y0,y1,label,color){
  const g=ctx.createLinearGradient(0,y0,0,y1)
  g.addColorStop(0,`rgba(${hr(color)},0.06)`);g.addColorStop(0.5,`rgba(${hr(color)},0.03)`);g.addColorStop(1,`rgba(${hr(color)},0.01)`)
  ctx.fillStyle=g;ctx.fillRect(0,y0,W,y1-y0)
  ctx.strokeStyle=`rgba(${hr(color)},0.2)`;ctx.lineWidth=1
  ctx.beginPath();ctx.moveTo(30,y1);ctx.lineTo(W-30,y1);ctx.stroke()
  ctx.fillStyle=color;ctx.globalAlpha=0.5;ctx.font='bold 10px "Segoe UI",sans-serif';ctx.textAlign='left';ctx.fillText(label,10,y0+14);ctx.globalAlpha=1
}

function drawPlant(x,y,s){
  ctx.save();const sw=Math.sin(fc*.015+x)*4;const t=Math.floor(x)%3
  // Pot
  const pw=s*.45,ph=s*.6,pr=s*.5
  ctx.fillStyle='#5a3830'
  ctx.beginPath();ctx.moveTo(x-pw*.6,y);ctx.lineTo(x+pw*.6,y);ctx.lineTo(x+pw*.5,y+ph);ctx.lineTo(x-pw*.5,y+ph);ctx.closePath();ctx.fill()
  ctx.fillStyle='#6b4538'
  ctx.beginPath();ctx.roundRect(x-pr,y-2,pr*2,5,1.5);ctx.fill()
  ctx.fillStyle='#3a2a1a';ctx.fillRect(x-pw*.4,y+1,pw*.8,3)
  // Stem + leaves
  if(t===0){
    // Tall plant (snake plant style)
    ctx.fillStyle='#2d5a1e'
    for(let i=0;i<4;i++){const lx=x+(i-1.5)*s*.15,ly=y-s*.1-i*s*.25,la=Math.sin(fc*.02+i+sw*.1)*.15
      ctx.save();ctx.translate(lx,ly);ctx.rotate(-.15+la+i*.1)
      ctx.beginPath();ctx.ellipse(0,-s*.3,s*.1,s*.35,0,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='#3d7a2e';ctx.beginPath();ctx.ellipse(i*2-3,-s*.38,s*.06,s*.28,0,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='#2d5a1e';ctx.restore()}
    ctx.fillStyle='#4a8a35'
    for(let i=0;i<3;i++){const lx=x+(i-1)*s*.12;ctx.beginPath();ctx.ellipse(lx,y-s*.6-i*s*.25,s*.07,s*.22,Math.sin(fc*.03+i)*.1,0,Math.PI*2);ctx.fill()}
  }else if(t===1){
    // Bushy round plant
    ctx.fillStyle='#2a5a1a';ctx.beginPath();ctx.arc(x+sw,y-s*.3,s*.5,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#3a7a2a';ctx.beginPath();ctx.arc(x+sw+5,y-s*.38,s*.38,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#4a9a3a';ctx.beginPath();ctx.arc(x+sw-4,y-s*.42,s*.32,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#3a8a2f';ctx.beginPath();ctx.arc(x+sw+1,y-s*.5,s*.26,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='#55aa44';ctx.beginPath();ctx.arc(x+sw-1,y-s*.58,s*.18,0,Math.PI*2);ctx.fill()
    // Small flowers
    for(let i=0;i<3;i++){const fx=x+sw+(i-1)*8,fy=y-s*.6-i*3;ctx.fillStyle='#ffdd55';ctx.beginPath();ctx.arc(fx,fy,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffaa22';ctx.beginPath();ctx.arc(fx,fy,1.5,0,Math.PI*2);ctx.fill()}
  }else{
    // Leafy tropical plant
    for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2+sw*.05,lx=x+Math.cos(a)*s*.3,ly=y-s*.2+Math.sin(a)*s*.15;ctx.save();ctx.translate(lx,ly);ctx.rotate(a+1.2)
      ctx.fillStyle='#2d6a22';ctx.beginPath();ctx.ellipse(-s*.08,-s*.25,s*.1,s*.3,0,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='#3d8a32';ctx.beginPath();ctx.ellipse(-s*.05,-s*.3,s*.06,s*.25,0,0,Math.PI*2);ctx.fill();ctx.restore()}
    ctx.fillStyle='#4a9a35';ctx.beginPath();ctx.arc(x+sw,y-s*.25,s*.18,0,Math.PI*2);ctx.fill()
  }
  ctx.restore()
}

function drawServerRack(x,y,w,h){
  ctx.save();ctx.fillStyle='#111620';ctx.strokeStyle='#252b38';ctx.lineWidth=1
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();ctx.stroke()
  for(let i=0;i<5;i++){const uy=y+4+i*(h-8)/5,bl=Math.sin(fc*.04+i*1.2)>0;ctx.fillStyle=bl?(i%2?'#0a3a2a':'#0a2a3a'):'#0a111a';ctx.fillRect(x+3,uy,w-6,(h-8)/5-2);ctx.fillStyle=bl?(i%2?'#3fb950':'#58a6ff'):'#1a2a2a';ctx.beginPath();ctx.arc(x+w-7,uy+3,1.5,0,Math.PI*2);ctx.fill()}
  ctx.restore()
}

function drawMonitor(x,y,active){
  ctx.save();const mw=48,mh=30
  ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-mw/2-1,y-1,mw+2,mh+2,3);ctx.fill()
  ctx.fillStyle='#22262d';ctx.fillRect(x-mw/2-1,y+mh-8,mw+2,9)
  ctx.fillStyle='#3a3d44';ctx.beginPath();ctx.arc(x,y+mh-1.5,2,0,Math.PI*2);ctx.fill()
  ctx.fillStyle='#252830';ctx.fillRect(x-3,y+mh,6,5);ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-14,y+mh+4,28,4,2);ctx.fill()
  if(active){
    ctx.fillStyle='#0a1628';ctx.fillRect(x-mw/2+4,y+4,mw-8,mh-13);ctx.strokeStyle='#3fb950';ctx.lineWidth=0.8
    for(let i=0;i<6;i++){const ly=y+7+i*3.2,ind=(i%3)*4;ctx.beginPath();ctx.moveTo(x-mw/2+7+ind,ly);ctx.lineTo(x-mw/2+7+ind+Math.sin(fc*0.07+i)*3+15,ly);ctx.stroke()}
    if(Math.floor(fc/15)%2){ctx.fillStyle='#3fb950';ctx.fillRect(x-mw/2+7+15,y+7,5,2.5)}
    ctx.fillStyle='#3fb950';ctx.beginPath();ctx.arc(x+mw/2-7,y+mh-3,2.5,0,Math.PI*2);ctx.fill()
  }else{
    ctx.fillStyle='#0d1117';ctx.fillRect(x-mw/2+4,y+4,mw-8,mh-13)
    ctx.fillStyle='#1a2a1a';ctx.beginPath();ctx.arc(x+mw/2-7,y+mh-3,2.5,0,Math.PI*2);ctx.fill()
  }
  ctx.restore()
}
function drawKeyboard(x,y){ctx.save();const kw=42,kh=12;ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.roundRect(x-kw/2,y,kw,kh,2.5);ctx.fill();ctx.fillStyle='#2a2d34';for(let r=0;r<5;r++){ctx.fillRect(x-kw/2+3,y+2+r*2,kw-6,1.4)}ctx.fillRect(x-12,y+9.5,24,1.4);ctx.restore()}
function drawMouse(x,y){ctx.save();ctx.fillStyle='#1a1d24';ctx.beginPath();ctx.ellipse(x,y,6,7.5,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#2a2d34';ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x,y+3);ctx.stroke();ctx.restore()}
function drawLaptop(x,y,active){
  ctx.save();const lw=40,sh=24,bh=8
  ctx.fillStyle='#a8acb4';ctx.beginPath();ctx.roundRect(x-lw/2,y-sh,lw,sh,3);ctx.fill()
  ctx.fillStyle='#161a20';ctx.fillRect(x-lw/2+3,y-sh+4,lw-6,sh-8)
  ctx.fillStyle='#0d1117';ctx.beginPath();ctx.arc(x,y-sh+3,1.2,0,Math.PI*2);ctx.fill()
  if(active){
    ctx.fillStyle='#0a1628';ctx.fillRect(x-lw/2+4,y-sh+7,lw-8,sh-13);ctx.strokeStyle='#58a6ff';ctx.lineWidth=0.8
    for(let i=0;i<5;i++){const ly=y-sh+9+i*2.8;ctx.beginPath();ctx.moveTo(x-lw/2+7,ly);ctx.lineTo(x-lw/2+7+Math.sin(fc*0.06+i)*2+13,ly);ctx.stroke()}
    if(Math.floor(fc/12)%2){ctx.fillStyle='#58a6ff';ctx.fillRect(x-lw/2+7+13,y-sh+9,5,2.5)}
  }else{ctx.fillStyle='#0d1117';ctx.fillRect(x-lw/2+4,y-sh+7,lw-8,sh-13)}
  ctx.fillStyle='#888c94';ctx.fillRect(x-lw/2,y-1,lw,2)
  ctx.fillStyle='#a8acb4';ctx.beginPath();ctx.roundRect(x-lw/2,y+1,lw,bh,1.5);ctx.fill()
  ctx.fillStyle='#2a2d34';ctx.fillRect(x-lw/2+3,y+2,lw-6,3.5);for(let r=0;r<6;r++)ctx.fillRect(x-lw/2+4,y+2.3+r*0.7,lw-8,0.5)
  ctx.fillStyle='#787c84';ctx.beginPath();ctx.roundRect(x-7,y+6,14,2,0.7);ctx.fill()

function drawHair(hx,hy,a,g){
  ctx.fillStyle=a.hc;const hs=a.hs||'short'
  if(hs==='pony'){ctx.beginPath();ctx.arc(hx,hy-2,14,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle='#cc4488';ctx.fillRect(hx-12,hy+3,24,3);ctx.fillStyle=a.hc;ctx.beginPath();ctx.moveTo(hx+6,hy+4);ctx.quadraticCurveTo(hx+18,hy-3,hx+20,hy+8);ctx.quadraticCurveTo(hx+12,hy+6,hx+3,hy+3);ctx.fill()}
  else if(hs==='long'){ctx.beginPath();ctx.arc(hx,hy-2,14,Math.PI,Math.PI*2);ctx.fill();ctx.fillRect(hx-15,hy,7,12);ctx.fillRect(hx+8,hy,7,12)}
  else if(hs==='buzz'){ctx.beginPath();ctx.arc(hx,hy+1,13,Math.PI,Math.PI*2);ctx.fill()}
  else if(hs==='spiky'){for(let i=-4;i<=4;i++){const sx=hx+i*4;ctx.beginPath();ctx.moveTo(sx-2,hy-8);ctx.lineTo(sx,hy-8-(7+Math.abs(i)*3));ctx.lineTo(sx+2,hy-8);ctx.fill()}ctx.beginPath();ctx.arc(hx,hy,13,Math.PI,Math.PI*2);ctx.fill()}
  else if(hs==='curly'){ctx.beginPath();ctx.arc(hx,hy-2,14,Math.PI,Math.PI*2);ctx.fill();for(let i=-3;i<=4;i++){ctx.beginPath();ctx.arc(hx+i*5,hy-4,4,0,Math.PI*2);ctx.fill()}}
  else{ctx.beginPath();ctx.arc(hx,hy-2,14,Math.PI,Math.PI*2);ctx.fill()}
}

function drawComicBubble(cx,cy,msg,accent){
  ctx.save();const mw=msg.length*6+18,bh=20;ctx.fillStyle='#fff';ctx.strokeStyle='#111';ctx.lineWidth=1.5
  ctx.beginPath();ctx.roundRect(cx-mw/2,cy-bh/2,mw,bh,7);ctx.fill();ctx.stroke()
  ctx.fillStyle='#fff';ctx.strokeStyle='#111';ctx.beginPath();ctx.moveTo(cx-5,cy+bh/2-1);ctx.lineTo(cx,cy+bh/2+8);ctx.lineTo(cx+5,cy+bh/2-1);ctx.closePath();ctx.fill();ctx.stroke()
  ctx.fillStyle='#111';ctx.font='bold 11px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText(msg,cx,cy+4)
  ctx.strokeStyle=accent;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx-mw/2+8,cy+bh/2-1);ctx.lineTo(cx+mw/2-8,cy+bh/2-1);ctx.stroke()
  ctx.restore()
}

function drawCharacter(ch){
  const a=ch.a,x=ch.x,y=ch.y,s=ch.state,ph=fc*.05+ch.ap,br=Math.sin(ph*.7)*(s==='idle'?2:0)
  const g=a.g||'male',sk=a.sk,skd=dc(sk)
  ctx.save();ctx.translate(x,y+ch.by)
  const st=s==='idle'||s==='walking'
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(0,st?0:-8,st?10:16,3.5,0,0,Math.PI*2);ctx.fill()

  if(st){
    const wc=Math.sin(ph*3),ls=s==='walking'?wc*7:0,bw=g==='female'?11:12
    //legs
    ctx.fillStyle='#282d38';ctx.save();ctx.translate(-4,-21);if(s==='walking')ctx.rotate(ls*.04);ctx.fillRect(-3,0,7,20);ctx.fillStyle='#1a1d24';ctx.fillRect(-4,17,10,4);ctx.restore()
    ctx.save();ctx.translate(4,-21);if(s==='walking')ctx.rotate(-ls*.04);ctx.fillRect(-4,0,7,20);ctx.fillStyle='#1a1d24';ctx.fillRect(-5,17,10,4);ctx.restore()
    //body
    const bt=-48,bb=-21;ctx.fillStyle=a.bc;ctx.beginPath()
    if(g==='female'){ctx.moveTo(-bw+1,bb);ctx.lineTo(bw-1,bb);ctx.quadraticCurveTo(bw+1,(bt+bb)/2,bw-1,bt);ctx.quadraticCurveTo(-bw+1,(bt+bb)/2,-bw+1,bb)}
    else{ctx.moveTo(-bw,bb);ctx.lineTo(bw,bb);ctx.lineTo(bw-1,bt);ctx.lineTo(-bw+1,bt)}
    ctx.closePath();ctx.fill()
    //arms
    const asw=s==='walking'?wc*12:0,aw=g==='female'?5:6
    ctx.fillStyle=a.bc;ctx.save();ctx.translate(-bw,bt+5);ctx.rotate(-.2+asw*.03);ctx.fillRect(-aw/2,0,aw,20);ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,21,4,0,Math.PI*2);ctx.fill();ctx.restore()
    ctx.save();ctx.translate(bw,bt+5);ctx.rotate(.2-asw*.03);ctx.fillRect(-aw/2,0,aw,20);ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,21,4,0,Math.PI*2);ctx.fill();ctx.restore()
    //head
    const hcy=bt-7+br;ctx.fillStyle=skd;ctx.fillRect(-4,bt,8,4);ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,hcy,13,0,Math.PI*2);ctx.fill()
    drawHair(0,hcy,a,g)
    ctx.fillStyle='#0d1117';ctx.beginPath();ctx.arc(-5,hcy-2,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(5,hcy-2,3,0,Math.PI*2);ctx.fill()
    if(Math.floor(ph/3)%4===0){ctx.fillStyle=sk;ctx.fillRect(-8,hcy-4,7,7);ctx.fillRect(1,hcy-4,7,7)}
    ctx.strokeStyle='#c44';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,hcy+5,4,.1,Math.PI-.1);ctx.stroke()
    //name label
    const ly=hcy-18;ctx.fillStyle='rgba(0,0,0,0.6)';const rw=a.role.length*5+6;ctx.fillRect(-rw/2,ly-10,rw,14);ctx.fillStyle=a.c;ctx.font='bold 9px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText(a.role,0,ly)
    //state badge
    if(ch.ts&&ch.w){const sy=ly-22,st=ch.ts.toUpperCase(),sw=st.length*5+8;const p=Math.sin(ph*2)*.15+.85;ctx.fillStyle=`rgba(${hr(a.c)},${p})`;ctx.beginPath();ctx.roundRect(-sw/2,sy-8,sw,14,4);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 8px "Segoe UI",sans-serif';ctx.fillText(st,0,sy+1)}
    //bubble
    if(s==='walking'&&ch.w&&ch.tsm)drawComicBubble(0,hcy-34,ch.tsm,a.c)
  }else{
    const bw=g==='female'?12:14,bt=-40,bb=-4
    // Chair behind character
    ctx.fillStyle='#282d38';ctx.fillRect(-14,4,28,7)
    ctx.fillStyle='#222830';ctx.fillRect(-5,-20,10,24)
    ctx.fillStyle='#303840';ctx.fillRect(-4,-23,8,4)
    // Legs under desk
    ctx.fillStyle='#282d38';ctx.fillRect(-8,-2,8,6);ctx.fillRect(1,-2,8,6)
    ctx.fillStyle='#1a1d24';ctx.fillRect(-9,2,10,3);ctx.fillRect(0,2,10,3)
    // Body — back view
    ctx.fillStyle=a.bc;ctx.beginPath()
    ctx.moveTo(-bw,bb);ctx.lineTo(bw,bb)
    ctx.lineTo(bw-2,bt);ctx.lineTo(-bw+2,bt)
    ctx.closePath();ctx.fill()
    // Arms — only when typing
    if(s==='typing'){const ta=Math.sin(ph*6)*4
      ctx.fillStyle=a.bc
      ctx.save();ctx.translate(-bw+2,bt+5);ctx.rotate(-.5+ta*.02)
      ctx.fillRect(-3,0,6,22+ta);ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,23+ta,4,0,Math.PI*2);ctx.fill()
      ctx.restore()
      ctx.save();ctx.translate(bw-2,bt+5);ctx.rotate(.5-ta*.02)
      ctx.fillRect(-3,0,6,22+ta);ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,23+ta,4,0,Math.PI*2);ctx.fill()
      ctx.restore()
    }
    // Head from behind — just hair, no face
    const hcy=bt-6;ctx.fillStyle=skd;ctx.fillRect(-4,bt,8,4)
    ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,hcy,13,0,Math.PI*2);ctx.fill()
    // Hair — back view (full coverage)
    ctx.fillStyle=a.hc;ctx.beginPath();ctx.arc(0,hcy-2,14,0,Math.PI*2);ctx.fill()
    // Name label above head
    const ly=hcy-18;ctx.fillStyle='rgba(0,0,0,0.6)';const rw=a.role.length*5+6;ctx.fillRect(-rw/2,ly-10,rw,14);ctx.fillStyle=a.c;ctx.font='bold 9px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText(a.role,0,ly)
    // State badge
    if(ch.ts&&ch.w){const sy=ly-22,st=ch.ts.toUpperCase(),sw=st.length*5+8;const p=Math.sin(ph*2)*.15+.85;ctx.fillStyle=`rgba(${hr(a.c)},${p})`;ctx.beginPath();ctx.roundRect(-sw/2,sy-8,sw,14,4);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 8px "Segoe UI",sans-serif';ctx.fillText(st,0,sy+1)}
    if(s==='typing'&&ch.tsm)drawComicBubble(0,hcy-34,ch.tsm,a.c)
  }
  ctx.restore()
}

function moveChar(ch,tx,ty,sp){ch.tx=tx;ch.ty=ty;ch.ws=sp||1.5;if(ch.state!=='walking'){ch.state='walking';ch.wp=0}}
function startTyping(ch){const dtx=ch.dx,dty=ch.dy+40;const dist=Math.sqrt((ch.x-dtx)**2+(ch.y-dty)**2)
  if(dist>20){moveChar(ch,dtx,dty,2);ch.w=true;const ck=setInterval(()=>{if(!ch.w){clearInterval(ck);return};const d=Math.sqrt((ch.x-dtx)**2+(ch.y-dty)**2);if(d<6||ch.state!=='walking'){clearInterval(ck);if(!ch.w)return;ch.state='typing';ch.x=dtx;ch.y=dty;ch.tx=ch.x;ch.ty=ch.y;if(ch.ti)clearInterval(ch.ti);ch.ti=setInterval(()=>{if(ch.state!=='typing'||!ch.w){clearInterval(ch.ti);ch.ti=null;return}},150+Math.random()*200)}},100)}
  else{ch.state='typing';ch.x=dtx;ch.y=dty;ch.tx=ch.x;ch.ty=ch.y;ch.w=true;if(ch.ti)clearInterval(ch.ti);ch.ti=setInterval(()=>{if(ch.state!=='typing'||!ch.w){clearInterval(ch.ti);ch.ti=null;return}},150+Math.random()*200)}}
function stopTyping(ch){ch.state='idle';ch.w=false;ch.hrw=false;if(ch.ti){clearInterval(ch.ti);ch.ti=null};ch.it=performance.now()+2000;moveChar(ch,ch.ix,ch.iy,1)}
function highlightAgent(name){const now=performance.now();if(!state._lt||(now-state._lt)>1000){AL.forEach(a=>{if(a.n!==name){const oc=chars[a.n];if(oc&&oc.w)stopTyping(oc)}})};state._lt=now;const ch=chars[name];if(!ch)return;ch.hrw=true;if(ch.state!=='typing')startTyping(ch)}
function showDoneNotif(x,y,agentName,color){doneNotifs.push({x,y,agentName,color,life:70,sy:y})}
function randomWander(ch){if(ch.state!=='idle'||ch.w)return;const r=chars._r,a=ch.a;let wx,wy;const roll=Math.random()
  if(roll<.3&&POI.length>0){const p=POI[Math.floor(Math.random()*POI.length)];wx=p.x+(Math.random()-.5)*20;wy=p.y+(Math.random()-.5)*10}
  else if(roll<.6){const cols=AL.filter(c=>c.tier===a.tier&&c.n!==a.n);if(cols.length>0){const cl=chars[cols[Math.floor(Math.random()*cols.length)].n];wx=cl.x+(Math.random()-.5)*30+20;wy=cl.y+(Math.random()-.5)*15}else{wx=ch.ix+(Math.random()-.5)*60;wy=ch.iy+(Math.random()-.5)*20}}
  else{wx=ch.ix+(Math.random()-.5)*80;wy=ch.iy+(Math.random()-.5)*30}
  if(a.tier==='T1')wy=Math.min(Math.max(wy,r.t1t+20),r.t1b-20);else if(a.tier==='T2')wy=Math.min(Math.max(wy,r.t2t+20),r.t2b-20);else if(a.tier==='T3')wy=Math.min(Math.max(wy,r.t3t+30),r.t3b-30);else wy=Math.min(Math.max(wy,r.t4t+20),r.t4b-20)
  wx=Math.max(60,Math.min(W-60,wx));moveChar(ch,wx,wy,.8+Math.random()*.5);sfx('footstep')
  setTimeout(()=>{if(ch&&ch.state==='walking'&&!ch.w){ch.state='idle';ch.it=performance.now()+1500+Math.random()*3000;setTimeout(()=>{if(ch&&ch.state==='idle'&&!ch.w)moveChar(ch,ch.ix,ch.iy,1)},2000)}},1500)
}

// STATE
// ============================================================
const state={workflow:'—',phase:'—',agent:null,retry:'0/3',elapsed:0,startTime:Date.now(),mode:location.protocol==='http:'||location.protocol==='https:'?'sse':'demo',sseConnected:false,lastRealEvent:0,lastTick:-1,_lt:0}
function addLog(msg,color){const ct=document.getElementById('logOverlay');const d=document.createElement('div');d.className='log-item';d.style.borderLeftColor=color||'#888';const t=new Date();d.textContent=`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')} ${msg}`;ct.insertBefore(d,ct.firstChild);if(ct.children.length>8)ct.removeChild(ct.lastChild)}
function updateStatus(){document.getElementById('wfVal').textContent=state.workflow;document.getElementById('phVal').textContent=state.phase;document.getElementById('agVal').textContent=state.agent||'—';const el=document.getElementById('rtVal');if(el)el.textContent=state.retry}
function updateElapsed(){const ms=Date.now()-state.startTime;const h=String(Math.floor(ms/3600000)).padStart(2,'0'),m=String(Math.floor((ms%3600000)/60000)).padStart(2,'0'),s=String(Math.floor((ms%60000)/1000)).padStart(2,'0');document.getElementById('elVal').textContent=`${h}:${m}:${s}`}

function processEvent(event){
  const isReal=event.type!=='agent_status'&&event.type!=='connected'
  if(isReal){state.lastRealEvent=performance.now();document.getElementById('modeTxt').textContent='🔴 Live';document.getElementById('modeTxt').style.opacity='0.8'}
  const tc={T0:'#8b949e',T1:'#58a6ff',T2:'#d29922',T3:'#3fb950',T4:'#bc8cff'},ac=event.tier_from||event.tier_to||'T1',color=tc[ac]||'#888'
  if(event.type==='task_start'||event.type==='phase_change'){
    state.agent=event.to||event.from||state.agent;if(event.phase)state.phase=event.phase;if(event.workflow)state.workflow=event.workflow;if(event.retry)state.retry=event.retry
    if(state.agent)highlightAgent(state.agent)
    if(event.from||event.to){const fc=chars[event.from],tc=chars[event.to];const sx=fc?fc.x:W*.3,sy=fc?fc.y-20:H*.2;const tx=tc?tc.x:W*.7,ty=tc?tc.y-20:H*.5;contracts.push({x:sx,y:sy,tx,ty,alpha:1,emoji:'📋',life:80});sfx('contract')}
    addLog(`[${ac}] ${event.message||event.type}`,color);if(isReal)sfx('notification')
  }else if(event.type==='agent_state'){
    const ag=event.agent,ch=chars[ag];if(ch){
      ch.ts=event.tuiState||event.state||'';ch.tsm=event.message||'';
      if(event.tuiState==='idle'||!event.tuiState){if(ch.w){stopTyping(ch);showDoneNotif(ch.x,ch.y-30,ch.a.role,ch.a.c)}}
      else if(!ch.w&&ch.state!=='typing'){ch.hrw=true;startTyping(ch)}
      state.agent=ag;if(event.tuiState)state.phase=event.tuiState;
      addLog(`[${AGENTS[ag]?.tier||'?'}] ${ag}: ${event.tuiState||''}`,AGENTS[ag]?.c||'#888')
    }
    updateStatus();return
  }else if(event.type==='task_end'){
    const ch=chars[event.from||event.to];if(ch){const wasWorking=ch.w;stopTyping(ch);if(event.status!=='fail'&&wasWorking)showDoneNotif(ch.x,ch.y-30,ch.a.role,ch.a.c)}
    addLog(`[${ac}] ${event.message||(event.status==='fail'?'✗ Failed':'✓ Done')}`,event.status==='fail'?'#f85149':color)
  }else if(event.type==='contract'){if(event.from||event.to){const fc=chars[event.from],tc=chars[event.to];const sx=fc?fc.x:W*.3,sy=fc?fc.y-20:H*.2;const tx=tc?tc.x:W*.7,ty=tc?tc.y-20:H*.5;contracts.push({x:sx,y:sy,tx,ty,alpha:1,emoji:'📋',life:80});sfx('contract')}}else if(!isReal)return;else addLog(event.message||'','#8b949e')
  updateStatus()
}

function connectSSE(){const es=new EventSource('/events');es.onopen=()=>{state.sseConnected=true;state.lastRealEvent=performance.now();document.getElementById('modeTxt').textContent='⚪ Idle';document.getElementById('modeTxt').style.opacity='0.5';addLog('🔴 SSE connected','#58a6ff');playAmbient();sfx('door')};es.onmessage=(e)=>{try{const ev=JSON.parse(e.data);if(ev.type==='connected')return;processEvent(ev)}catch{}};es.onerror=()=>{state.sseConnected=false;document.getElementById('modeTxt').textContent='⚠️ Reconnecting...';document.getElementById('modeTxt').style.opacity='0.4';setTimeout(connectSSE,3000)}}

// ============================================================
// MAIN LOOP
// ============================================================
function animate(now){fc++;updateElapsed()
  if(!chars)return
  if(state.mode==='sse'&&state.sseConnected&&now-state.lastRealEvent>15000){document.getElementById('modeTxt').textContent='⚪ Idle';document.getElementById('modeTxt').style.opacity='0.5'}

  AL.forEach(a=>{const ch=chars[a.n];ch.ap+=.03
    if(ch.state==='walking'){const dx=ch.tx-ch.x,dy=ch.ty-ch.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<2){ch.x=ch.tx;ch.y=ch.ty;ch.state=ch.w?'typing':'idle';if(!ch.w)ch.it=now+1000+Math.random()*2000}else{const step=ch.ws*1.5;ch.x+=dx/dist*step;ch.y+=dy/dist*step;ch.wp+=step*.3;if(fc%18===0)sfx('footstep')}}
    if(ch.state==='idle'&&now>ch.it&&!ch.w){if(Math.random()<.015)randomWander(ch)}
  })

  for(let i=contracts.length-1;i>=0;i--){const ct=contracts[i];ct.x+=(ct.tx-ct.x)*.05;ct.y+=(ct.ty-ct.y)*.05;ct.life--;ct.alpha=Math.min(1,ct.life/40);if(ct.life<=0)contracts.splice(i,1)}
  for(let i=doneNotifs.length-1;i>=0;i--){const dn=doneNotifs[i];dn.life--;dn.y=dn.sy-(70-dn.life)*.5;if(dn.life<=0){doneNotifs.splice(i,1);continue}}

  // RENDER
  ctx.clearRect(0,0,W,H)
  const r=chars._r

  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#141c28');bg.addColorStop(0.2,'#192233');bg.addColorStop(0.7,'#161e2a');bg.addColorStop(1,'#101720');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H)

  // Wooden floor
  for(let fx=0;fx<W;fx+=60){ctx.fillStyle='rgba(90,45,25,'+(.04+Math.sin(fx*.02)*.01)+')';ctx.fillRect(fx,H*.18,58,H*.82)}
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H*.18);ctx.lineTo(W,H*.18);ctx.stroke()
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H*.96);ctx.lineTo(W,H*.96);ctx.stroke()

  // Server racks — left wall
  drawServerRack(W*.05,H*.22,32,58);drawServerRack(W*.05,H*.22+60,32,58);drawServerRack(W*.12,H*.25+3,30,54);drawServerRack(W*.12,H*.25+58,30,54);

  plants.forEach(p=>drawPlant(p.x,p.y,p.s))

  // Banner — top center
  ctx.fillStyle='rgba(88,166,255,0.06)';ctx.fillRect(W*.32,H*.02,W*.36,H*.04)
  ctx.strokeStyle='rgba(88,166,255,0.12)';ctx.lineWidth=1;ctx.strokeRect(W*.32,H*.02,W*.36,H*.04)
  ctx.fillStyle='rgba(88,166,255,0.22)';ctx.font='bold 9px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText('PXH2910 · AI Company',W*.5,H*.044)

  // Wall clock
  ctx.fillStyle='#f5f5f0';ctx.beginPath();ctx.arc(W*.7,H*.06,11,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#111';ctx.fillRect(W*.7-.5,H*.06-7,1,4);ctx.fillRect(W*.7-.5,H*.06+2,1,5);

  // Desks — monitor row
  ;['pxh-architect','pxh-expert','pxh-fix-bugs'].forEach(n=>{const ch=chars[n];if(!ch)return;const act=ch.state==='typing';ctx.fillStyle='#1a1d24';ctx.fillRect(ch.dx+36,ch.dy+15,18,27);ctx.fillStyle='#252830';ctx.fillRect(ch.dx+37,ch.dy+18,15,21);ctx.fillStyle=act?'#3fb950':'#1a2a1a';ctx.beginPath();ctx.arc(ch.dx+45,ch.dy+33,2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4a3520';ctx.fillRect(ch.dx-40,ch.dy+22,80,8);drawMonitor(ch.dx,ch.dy-4,act);drawKeyboard(ch.dx,ch.dy+24);drawMouse(ch.dx+28,ch.dy+32)})

  // Desks — laptop row
  ;['pxh-qa','pxh-review-code','pxh-devops','pxh-ui-ux'].forEach(n=>{const ch=chars[n];if(!ch)return;const act=ch.state==='typing';ctx.fillStyle='#4a3520';ctx.fillRect(ch.dx-32,ch.dy+22,65,8);drawLaptop(ch.dx,ch.dy+9,act)})

  // Chairs — all agents
  ;AL.forEach(a=>{const ch=chars[a.n],cx=ch.dx,cy=ch.dy+40;ctx.fillStyle='#282d38';ctx.fillRect(cx-13,cy,27,6);ctx.fillStyle='#222830';ctx.fillRect(cx-4,cy-22,9,22);ctx.fillStyle='#303840';ctx.fillRect(cx-3,cy-25,6,3)})

  // PM corner desk
  const pm=chars['pxh-pm'];ctx.fillStyle='#5a4020';ctx.fillRect(pm.dx-60,pm.dy+22,100,9);drawMonitor(pm.dx,pm.dy-4,pm.state==='typing');drawKeyboard(pm.dx,pm.dy+24);drawMouse(pm.dx+40,pm.dy+32);ctx.fillStyle='#1a1d24';ctx.fillRect(pm.dx+44,pm.dy+15,21,27)

  // Help desk
  const hh=chars['pxh-help'];ctx.fillStyle='#4a3520';ctx.fillRect(hh.dx-40,hh.dy+22,80,9);drawMonitor(hh.dx,hh.dy-4,hh.state==='typing');drawKeyboard(hh.dx,hh.dy+24);drawMouse(hh.dx+28,hh.dy+32)

  // Historian desk
  const sh=chars['pxh-save-history'];ctx.fillStyle='#4a3520';ctx.fillRect(sh.dx-40,sh.dy+22,80,9);drawMonitor(sh.dx,sh.dy-4,sh.state==='typing');drawKeyboard(sh.dx,sh.dy+24);drawMouse(sh.dx+28,sh.dy+32)

  // Contracts + notifs
  contracts.forEach(ct=>drawContract(ct.x,ct.y,ct.alpha,ct.emoji))
  doneNotifs.forEach(dn=>{if(dn.life<=0)return;const a=Math.min(1,dn.life/25);ctx.save();ctx.globalAlpha=a;const t='✓ Done',tw=t.length*4+10;ctx.fillStyle='#fff';ctx.strokeStyle='#111';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(dn.x-tw/2,dn.y-7,tw,16,5);ctx.fill();ctx.stroke();ctx.fillStyle='#111';ctx.font='bold 8px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText(t,dn.x,dn.y+3);ctx.restore()})

  // Characters
  const walkers=AL.filter(a=>chars[a.n].state==='walking'||chars[a.n].state==='idle'),workers=AL.filter(a=>chars[a.n].state==='sitting'||chars[a.n].state==='typing')
  walkers.forEach(a=>drawCharacter(chars[a.n]));workers.forEach(a=>drawCharacter(chars[a.n]))

  // Water cooler — right side
  const wcx=W*.86,wcy=H*.68;ctx.fillStyle='#1a4060';ctx.fillRect(wcx-5,wcy,10,22);ctx.fillStyle='#58a6ff';ctx.fillRect(wcx-4,wcy-3,8,5);ctx.fillStyle='rgba(88,166,255,0.15)';ctx.fillRect(wcx-3,wcy+3,6,14)

  // Coffee machine
  ctx.fillStyle='#3a3a4a';ctx.fillRect(W*.82,H*.66,8,12);ctx.fillStyle='#2a2a3a';ctx.fillRect(W*.82-1,H*.66-2,10,3);ctx.fillStyle='#1a1a2a';ctx.beginPath();ctx.arc(W*.86,H*.73,2,0,Math.PI*2);ctx.fill()

  // Meeting table — top left
  const mtx=W*.26,mty=H*.12;ctx.fillStyle='#4a3520';ctx.fillRect(mtx-25,mty+4,50,7);ctx.fillStyle='#3a2a18';ctx.fillRect(mtx-23,mty+11,3,8);ctx.fillRect(mtx+20,mty+11,3,8)

  // Whiteboard — right wall
  ctx.fillStyle='#f5f5f0';ctx.fillRect(W-46,H*.3,34,28);ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.strokeRect(W-46,H*.3,34,28);ctx.fillStyle='#58a6ff';ctx.font='5px sans-serif';ctx.textAlign='center';ctx.fillText('SPRINT',W-29,H*.3+11);ctx.fillStyle='#3fb950';ctx.fillText('✓ Backlog',W-29,H*.3+17);ctx.fillText('→ In Progress',W-29,H*.3+22)

  // Door — right bottom
  ctx.fillStyle='#3a2a18';ctx.fillRect(W-30,H*.78,22,H*.16);ctx.strokeStyle='#4a3a28';ctx.lineWidth=1.5;ctx.strokeRect(W-30,H*.78,22,H*.16);ctx.fillStyle='#c8a050';ctx.beginPath();ctx.arc(W-18,H*.86,2,0,Math.PI*2);ctx.fill()

  requestAnimationFrame(animate)
}

// ============================================================
// INIT
// ============================================================
function init(){resize();addLog('🏢 Error404Labs - PXH2910','#58a6ff')
  if(state.mode==='sse'){addLog('⚡ SSE — real-time sync','#8b949e');connectSSE()}else{addLog('⚡ Demo — mở qua server để sync TUI','#8b949e');playAmbient()}
  state.startTime=Date.now();requestAnimationFrame(animate)}
c.addEventListener('click',(e)=>{const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;let cl=null,cd=35;AL.forEach(a=>{const ch=chars[a.n],dx=ch.x-mx,dy=ch.y-my,d=Math.sqrt(dx*dx+dy*dy);if(d<cd){cd=d;cl=a}});if(cl){state.agent=cl.n;updateStatus();addLog(`👤 ${cl.role} (${cl.n})`,cl.c);sfx('notification');const ch=chars[cl.n];ch.by=-6;setTimeout(()=>{ch.by=0},300)}})
window.addEventListener('resize',resize);document.addEventListener('DOMContentLoaded',init)
</script>
</body>
