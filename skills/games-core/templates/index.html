<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
    #app, #game { width: 100%; height: 100%; }
    canvas { display: block; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #111; color: #fff; font: 18px sans-serif; z-index: 9999;
      flex-direction: column; gap: 16px;
    }
    #loading-bar {
      width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden;
    }
    #loading-bar-fill {
      width: 0%; height: 100%; background: linear-gradient(90deg, #f43f5e, #e11d48);
      transition: width 0.3s;
    }
    #loading.hide { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
  </style>
</head>
<body>
  <div id="loading">
    <span>Đang tải...</span>
    <div id="loading-bar"><div id="loading-bar-fill"></div></div>
  </div>
  <div id="app"></div>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
