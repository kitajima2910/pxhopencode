# Agent Permission Template
# Các agent dùng 1 trong 2 mẫu dưới đây:

# Mẫu A — Full access (pxh-pm, pxh-expert, pxh-devops, pxh-save-history)
full:
  read: allow
  edit: allow
  bash: allow
  glob: allow
  grep: allow
  webfetch: allow
  websearch: allow

# Mẫu B — Read-only (pxh-help, pxh-architect, pxh-qa, pxh-review-code)
readonly:
  read: allow
  edit: deny
  bash: ask
  glob: allow
  grep: allow
  webfetch: allow
  websearch: allow
